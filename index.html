<!DOCTYPE html>

<head>

<title>Wargame Vision System</title>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --fs-xs:11px; --fs-sm:12px; --fs-md:13px; --fs-lg:14px; --fs-xl:16px;
  --lh:1.5;
}
body{background:#050d1a;color:#c8dff5;font-family:'Rajdhani',monospace;overflow-x:hidden;font-size:var(--fs-lg);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#050d1a;}::-webkit-scrollbar-thumb{background:#0e2a4a;}
.rb{border:1px solid #0e2a4a;background:transparent;color:#3a5a7a;cursor:pointer;font-family:'Rajdhani',monospace;font-weight:600;letter-spacing:1px;transition:all .2s;font-size:var(--fs-md);}
.rb:hover{border-color:#f97316;color:#f97316;}
.rb.on{border-color:#f97316;color:#f97316;background:rgba(249,115,22,0.18);}
.rb.bon{border-color:#38bdf8;color:#38bdf8;background:rgba(56,189,248,0.12);}
.rb.gon{border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,0.12);}
.rb.ron{border-color:#f43f5e;color:#f43f5e;background:rgba(244,63,94,0.12);}
.panel{background:#070f20;border:1px solid #0e2a4a;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#f97316,transparent);opacity:.4;}
.tag{font-size:var(--fs-sm);font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:2px;}
/* Escalar todos los textos inline que se quedan pequeños */
span,div,p,label{font-size:inherit;}
.pulse{animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.unit-row{border:1px solid #0e2a4a;border-radius:2px;padding:9px 12px;margin-bottom:5px;transition:all .2s;background:#050d1a;cursor:pointer;font-size:var(--fs-md);}
.unit-row:hover{border-color:#1e3a5a;}
.unit-row.deployed{border-color:#22c55e44;background:rgba(34,197,94,0.04);}
.unit-row.eliminated{border-color:#f43f5e22;background:rgba(244,63,94,0.04);opacity:0.5;}
.unit-row.selected-unit{border-color:#f97316;background:rgba(249,115,22,0.06);}
.aura-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:2px;font-size:var(--fs-xs);font-weight:700;letter-spacing:1px;margin:2px;}
.drop-zone{border:2px dashed #0e2a4a;border-radius:4px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;font-size:var(--fs-md);}
.drop-zone:hover,.drop-zone.drag-over{border-color:#38bdf8;background:rgba(56,189,248,0.05);}
input[type=file]{display:none;}
/* Forzar herencia en todos los contenedores React */
#root *{font-family:'Rajdhani',monospace;}
/* Escala mínima — nada por debajo de 11px */
#root [style*="fontSize: 8"],#root [style*="fontSize: 9"],#root [style*="fontSize: 10"]{font-size:var(--fs-xs) !important;}
</style>
</head>

// ═══════════════════════════════════════════════════════════════════════════════
// REGLAS WARHAMMER 40,000 — REFERENCIA PARA LA APP
// Extraídas del libro de reglas físico. Usadas para cálculos de auras,
// distancias, coherencia, carga y combate.
// ═══════════════════════════════════════════════════════════════════════════════

// ── DISTANCIAS CLAVE ──────────────────────────────────────────────────────────
// Engagement Range:          1" horizontal, 5" vertical
//                            → Dos unidades están en combate si están dentro de 1"
// Coherencia de unidad:      2" horizontal, 5" vertical de AL MENOS 1 modelo (unidades 2-6)
//                            2" horizontal, 5" vertical de AL MENOS 2 modelos (unidades 7+)
// Rango de carga:            2D6" (media 7"). La unidad debe poder acabar a 1" del objetivo.
// Pile In:                   hasta 3" hacia el modelo enemigo más cercano
// Consolidate:               hasta 3" hacia el modelo enemigo más cercano
//                            (o hacia el objetivo más cercano si no hay enemigos)
// Terrain ≤ 2":              los modelos pueden moverse sobre él libremente
// Terrain > 2":              los modelos pueden escalar pero cuentan la distancia vertical

// ── FASES DE TURNO ────────────────────────────────────────────────────────────
// 1. MOVIMIENTO
//    - Normal Move: hasta M" (no puede terminar en Engagement Range de enemigos)
//    - Advance:     M + D6" (no puede disparar ni cargar ese turno)
//    - Fall Back:   hasta M" (puede atravesar enemigos con Desperate Escape tests,
//                             1D6 por modelo que cruce: en 1-2, ese modelo es destruido)
//    - Remain Stationary: no mueve. Puede Avanzar/Fall Back en fases siguientes.
//
// 2. CARGA (Charge Phase)
//    - Elegible: unidad a ≤12" de unidades enemigas (no necesita línea de visión)
//    - Roll: 2D6. Debe ser suficiente para acabar a 1" (Engagement Range) del objetivo
//    - Charge Bonus: al final del turno, unidad tiene "Fights First" hasta fin de turno
//    - FLY: mide "por el aire" (distancia diagonal si sube/baja terreno)
//    - Terreno >2": cuenta distancia vertical de subida y bajada
//
// 3. COMBATE (Fight Phase)
//    - Paso 1 — FIGHTS FIRST: unidades con esa habilidad + unidades que cargaron
//    - Paso 2 — REMAINING COMBATS: resto de unidades elegibles
//    - Elegible para combatir: dentro de Engagement Range de enemigos,
//                              O hizo una carga este turno
//    - Pile In: cada modelo mueve ≤3" hacia el modelo enemigo más cercano
//      (debe acabar más cerca del enemigo más cercano y en coherencia de unidad)
//    - Select Targets: modelos dentro de Engagement Range del enemigo,
//      O en contacto base a base con un modelo de su propia unidad que SÍ esté en ER
//    - Consolidate: ≤3" hacia el modelo enemigo más cercano
//      (si no hay enemigos, hacia el objetivo más cercano)

// ── COHERENCIA DE UNIDAD ─────────────────────────────────────────────────────
// Unidades 2-6 modelos: cada modelo a ≤2" horizontal y ≤5" vertical de ≥1 modelo
// Unidades 7+ modelos:  cada modelo a ≤2" horizontal y ≤5" vertical de ≥2 modelos
// Si no puede mantener coherencia al final de un movimiento → no puede hacer ese movimiento
// Al final del turno: si no está en coherencia, eliminar modelos hasta que lo esté
// Modelos eliminados así cuentan como destruidos pero NO activan reglas de "al ser destruido"

// ── IMPLICACIONES PARA LA APP ─────────────────────────────────────────────────
// Aura de Engagement Range:  1" desde el borde de la peana → zona de combate
// Aura de Carga:             M + 7" (media 2D6) desde borde de peana
// Coherencia visual:         2" entre modelos del mismo jugador (futuro: alertar si >2")
// Pile In / Consolidate:     3" adicionales al movimiento en fase de combate
// Advance range:             M + D6" → mostrar como M + 3.5" promedio (o M+1 a M+6)

// ── CONVENCIONES DE MEDIDA ───────────────────────────────────────────────────
// Todas las distancias se miden de borde de peana a borde de peana
// 1" = 25.4mm = 1 pulgada
// Los vuelos (FLY) miden distancia en línea recta por el aire
// Para el canvas: inchPx = canvasWidth / boardWidth_in_inches

//

//         - Sweeping Engagement: revisar diagonal asimétrica
//

//          Iván tiene las cartas físicas de despliegue escaneadas (6 imágenes).
//          Hay que revisar cada zona una a una contrastando con las fotos y

//         En modo "border" (sin relleno) aún se ven las líneas discontinuas

//         tipo/unidad y detectar qué figuras rompen la coherencia.
//
// TODO-9: ✅ COMPLETADO — Calibración de cámara con 4 clicks en esquinas del tapete
//         PROBLEMA: Los marcadores ArUco requieren impresora. La mayoría de usuarios
//         no tiene impresora o no quiere pegar papeles en su tapete.
//
//         SOLUCIÓN PRINCIPAL — Calibración manual con 4 clicks:
//         1. El usuario activa el modo calibración en la app
//         2. La app muestra la imagen de la cámara en pantalla

//           4 puntos clickeables, cálculo de homografía en JS (perspectiveTransform)

//         - La homografía permite convertir coordenadas píxel → pulgadas reales

// ─── DIBUJO ──────────────────────────────────────────────────────────────────

// Dibuja un marcador de objetivo (calavera) en posición en pulgadas
function drawObjective(ctx,x,y,inchPx,label){
  const r=(40/2/25.4)*inchPx; // peana exterminador 40mm
  ctx.save();
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle="rgba(20,30,50,0.7)";ctx.fill();
  ctx.strokeStyle="#c8dff5";ctx.lineWidth=1;ctx.stroke();
  // Calavera simplificada
  ctx.fillStyle="#c8dff5";ctx.font=`bold ${Math.max(8,r*1.1)}px 'Rajdhani',monospace`;
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText("☠",x,y);
  if(label){
    ctx.font=`bold ${Math.max(7,r*0.7)}px 'Rajdhani',monospace`;
    ctx.fillStyle="#c8dff566";ctx.fillText(label,x,y+r+5);
  }
  ctx.restore();
}

function drawDeploymentZone(ctx,W,H,BW,BH,zoneKey){
  const px=v=>v*W/BW, py=v=>v*H/BH;
  const iP=W/BW; // inchPx
  const P1="#f97316",P2="#38bdf8",NML="rgba(255,255,255,0.03)";

  const fillZ=(path,fill,stroke,dash=true)=>{
    ctx.save();ctx.beginPath();path();
    ctx.fillStyle=fill+"2a";ctx.fill();
    ctx.strokeStyle=stroke;ctx.lineWidth=1.5;
    if(dash)ctx.setLineDash([6,4]);
    ctx.stroke();ctx.setLineDash([]);ctx.restore();
  };

  // Etiqueta de zona
  const zoneLabel=(x,y,c,txt)=>{
    ctx.save();ctx.font="bold 12px 'Rajdhani',monospace";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=8;
    ctx.fillText(txt,x,y);ctx.shadowBlur=0;ctx.restore();
  };

  // ── HAMMER AND ANVIL ────────────────────────────────────────────────
  // J1: franja sup 12", J2: franja inf 12", NML 6" central
  // Tablero 44"×30". Objetivos: centro de cada zona + 2 laterales a 16" del centro
  if(zoneKey==="hammer_and_anvil"){
    fillZ(()=>ctx.rect(0,0,W,py(12)),P1,P1);
    fillZ(()=>ctx.rect(0,H-py(12),W,py(12)),P2,P2);
    fillZ(()=>ctx.rect(0,py(12),W,py(6)),NML,"transparent",false);
    zoneLabel(W/2,py(6),P1,"J1 — ATTACKER");
    zoneLabel(W/2,H-py(6),P2,"J2 — DEFENDER");
    // Objetivos: layout de la carta (5 objetivos)
    drawObjective(ctx,W/2,py(8),iP,"1");           // centro zona J1
    drawObjective(ctx,W/2,H-py(8),iP,"5");          // centro zona J2
    drawObjective(ctx,W/2,H/2,iP,"3");               // centro tablero
    drawObjective(ctx,W/2-px(16),H/2,iP,"2");        // lateral izq
    drawObjective(ctx,W/2+px(16),H/2,iP,"4");        // lateral der
  }

  // ── SEARCH AND DESTROY ──────────────────────────────────────────────
  // J1: cuadrante sup-izq (hasta 12" del centro en X e Y)
  // J2: cuadrante inf-der (espejo)
  // Exclusión circular 9" en el centro
  else if(zoneKey==="search_and_destroy"){
    // J1 sup-izq: desde (0,0) hasta (BW/2, BH/2), margen de 12" del centro diagonal
    fillZ(()=>{
      ctx.moveTo(0,0);ctx.lineTo(W,0);
      ctx.lineTo(W,H/2-py(12));ctx.lineTo(W/2+px(12),H/2-py(12));
      ctx.lineTo(W/2,0);ctx.closePath();
    },P1,P1);
    // Triángulo rojo principal
    fillZ(()=>{
      ctx.moveTo(0,0);ctx.lineTo(W/2-px(0),0);
      ctx.lineTo(0,H/2);ctx.closePath();
    },P1,P1);
    // J2 inf-der espejo
    fillZ(()=>{
      ctx.moveTo(W,H);ctx.lineTo(W/2,H);
      ctx.lineTo(W,H/2);ctx.closePath();
    },P2,P2);
    // Zona exclusión 9"
    ctx.save();ctx.beginPath();ctx.arc(W/2,H/2,px(9),0,Math.PI*2);
    ctx.fillStyle="rgba(5,13,26,0.6)";ctx.fill();
    ctx.strokeStyle="#f43f5e";ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="#f43f5e88";ctx.font="bold 10px 'Rajdhani',monospace";
    ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText('9"',W/2,H/2);
    ctx.restore();
    zoneLabel(px(8),py(6),P1,"J1");
    zoneLabel(W-px(8),H-py(6),P2,"J2");
    // Objetivos (4): 2 por bando a 12" del centro lateral
    drawObjective(ctx,px(12),py(6),iP,"1");
    drawObjective(ctx,W/2+px(12),py(6),iP,"2");
    drawObjective(ctx,W/2-px(12),H-py(6),iP,"3");
    drawObjective(ctx,W-px(12),H-py(6),iP,"4");
  }

  // ── CRUCIBLE OF BATTLE ──────────────────────────────────────────────
  // Diagonal de esquina sup-izq a inf-der. J1 triángulo sup, J2 triángulo inf
  // Exclusión 6" desde la diagonal
  else if(zoneKey==="crucible_of_battle"){
    // J1: triángulo superior (sup-izq a sup-der a inf-der)
    fillZ(()=>{
      ctx.moveTo(0,0);ctx.lineTo(W,0);
      ctx.lineTo(W,H-py(6));ctx.lineTo(px(6),H);
      ctx.lineTo(0,H);ctx.closePath();
    },P1,P1);
    // J2: triángulo inferior (inf-der a inf-izq a sup-izq)  
    fillZ(()=>{
      ctx.moveTo(W,H);ctx.lineTo(0,H);
      ctx.lineTo(0,py(6));ctx.lineTo(W-px(6),0);
      ctx.lineTo(W,0);ctx.closePath();
    },P2,P2);
    zoneLabel(px(8),py(5),P1,"J1");
    zoneLabel(W-px(8),H-py(5),P2,"J2");
    // Objetivos: según carta (centro + laterales)
    drawObjective(ctx,px(8),py(8),iP,"1");
    drawObjective(ctx,W/2,py(10),iP,"2");
    drawObjective(ctx,W/2,H-py(10),iP,"3");
    drawObjective(ctx,W-px(8),H-py(8),iP,"4");
  }

  // ── DAWN OF WAR ─────────────────────────────────────────────────────
  // Franjas verticales: J1 primeros 12" borde izq, J2 últimos 12" borde der
  // Exclusión: 4" desde cada borde de zona hacia dentro
  else if(zoneKey==="dawn_of_war"){
    fillZ(()=>ctx.rect(0,0,px(12),H),P1,P1);
    fillZ(()=>ctx.rect(W-px(12),0,px(12),H),P2,P2);
    // Marcas de exclusión 4"
    ctx.save();ctx.strokeStyle=P1+"88";ctx.lineWidth=1;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(px(4),0);ctx.lineTo(px(4),H);ctx.stroke();
    ctx.strokeStyle=P2+"88";
    ctx.beginPath();ctx.moveTo(W-px(4),0);ctx.lineTo(W-px(4),H);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
    zoneLabel(px(6),H/2,P1,"J1");
    zoneLabel(W-px(6),H/2,P2,"J2");
    // Objetivos: 2 por bando a 4" del borde de zona + centro
    drawObjective(ctx,px(6),H/2-py(10),iP,"1");
    drawObjective(ctx,px(6),H/2+py(10),iP,"2");
    drawObjective(ctx,W/2,H/4,iP,"3");
    drawObjective(ctx,W/2,H*3/4,iP,"4");
    drawObjective(ctx,W-px(6),H/2-py(10),iP,"5");
    drawObjective(ctx,W-px(6),H/2+py(10),iP,"6");
  }

  // ── SWEEPING ENGAGEMENT ─────────────────────────────────────────────
  // Diagonal: J1 triángulo sup-izq (16" desde borde largo), J2 inf-der espejo
  // Exclusión 8" desde la diagonal + 12" desde el centro
  else if(zoneKey==="sweeping_engagement"){
    fillZ(()=>{
      ctx.moveTo(0,0);ctx.lineTo(W,0);
      ctx.lineTo(W/2,H/2-py(12));
      ctx.lineTo(0,py(8));ctx.closePath();
    },P1,P1);
    fillZ(()=>{
      ctx.moveTo(W,H);ctx.lineTo(0,H);
      ctx.lineTo(W/2,H/2+py(12));
      ctx.lineTo(W,H-py(8));ctx.closePath();
    },P2,P2);
    zoneLabel(px(8),py(5),P1,"J1");
    zoneLabel(W-px(8),H-py(5),P2,"J2");
    // Objetivos según carta
    drawObjective(ctx,W/2+px(8),py(8),iP,"1");
    drawObjective(ctx,px(16),H/2-py(8),iP,"2");
    drawObjective(ctx,W-px(16),H/2+py(8),iP,"3");
    drawObjective(ctx,W/2-px(8),H-py(8),iP,"4");
  }

  // ── SPEARHEAD ASSAULT (legacy) ──────────────────────────────────────
  else if(zoneKey==="spearhead_assault"){
    fillZ(()=>{ctx.moveTo(0,py(9));ctx.lineTo(px(15),H/2);ctx.lineTo(0,H-py(9));ctx.closePath();},P1,P1);
    fillZ(()=>{ctx.moveTo(W,py(9));ctx.lineTo(W-px(15),H/2);ctx.lineTo(W,H-py(9));ctx.closePath();},P2,P2);
    zoneLabel(px(4),H/2,P1,"J1");zoneLabel(W-px(4),H/2,P2,"J2");
  }
}

function drawUnit(ctx,mini,unit,playerColor,W,H,BW,selected,t,auraColors){
  // drawUnit YA NO dibuja auras — las auras se dibujan aparte con fusión
  const cx=mini.x*W,cy=mini.y*H,color=playerColor||"#3a5a7a";
  const [r,g,b]=h2p(color);
  const inchPx=W/BW;
  const bsz=(unit.base_size_mm/2/25.4)*inchPx;
  ctx.save();ctx.beginPath();if(unit.base_type==="oval")ctx.ellipse(cx,cy,bsz,bsz*0.6,0,0,Math.PI*2);else ctx.arc(cx,cy,bsz,0,Math.PI*2);
  ctx.fillStyle=`rgba(${r},${g},${b},0.15)`;ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=selected?2:1.2;
  ctx.shadowColor=color;ctx.shadowBlur=selected?14:7;ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle=color;ctx.font=`bold ${Math.max(9,bsz*0.9)}px 'Rajdhani',monospace`;
  ctx.textAlign="center";ctx.textBaseline="middle";ctx.shadowColor=color;ctx.shadowBlur=5;
  ctx.fillText(unit.name[0].toUpperCase(),cx,cy);ctx.shadowBlur=0;
  ctx.font="bold 9px 'Rajdhani',monospace";ctx.fillText(unit.name.split(' ')[0],cx,cy+bsz+4);
  if(!playerColor){ctx.beginPath();ctx.arc(cx+bsz*0.7,cy-bsz*0.7,5,0,Math.PI*2);ctx.fillStyle="#f97316";ctx.shadowColor="#f97316";ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;ctx.fillStyle="#050d1a";ctx.font="bold 7px monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("!",cx+bsz*0.7,cy-bsz*0.7);}
  ctx.restore();
}

// Calcula el centroide ponderado de un grupo de círculos (centro de masa por área)
// TODO-8: ✅ COMPLETADO — Alerta visual de coherencia de unidad
// Dibuja líneas de alerta entre figuras de la misma unidad que están a >2"
function drawCoherency(ctx,minis,W,H,BW){
  const inchPx=W/BW;
  const coherenceInch=2; // regla: 2" entre figuras
  // Agrupar minis por (playerId, unitId)
  const byUnit={};
  minis.forEach(mini=>{
    if(!mini.unitData)return;
    const key=`${mini.playerId}_${mini.unitData.id}`;
    if(!byUnit[key])byUnit[key]=[];
    byUnit[key].push(mini);
  });
  Object.values(byUnit).forEach(group=>{
    if(group.length<2)return;
    const count=group.length;
    const required=count>=7?2:1; // 7+ modelos necesitan 2 vecinos a ≤2"
    group.forEach((mini,i)=>{
      const cx=mini.x*W,cy=mini.y*H;
      const bsz=(mini.unitData.base_size_mm/2/25.4)*inchPx;
      // Distancias a todos los demás del grupo (borde a borde)
      const distances=group
        .filter((_,j)=>j!==i)
        .map(other=>{
          const ox=other.x*W,oy=other.y*H;
          const obz=(other.unitData.base_size_mm/2/25.4)*inchPx;
          const dist=Math.hypot(cx-ox,cy-oy)-(bsz+obz); // borde a borde
          return {other,dist,ox,oy};
        })
        .sort((a,b)=>a.dist-b.dist);
      // Contar cuántos vecinos están a ≤2"
      const nearCount=distances.filter(d=>d.dist<=coherenceInch*inchPx).length;
      if(nearCount<required){
        // Dibujar alerta — línea al vecino más cercano fuera de rango
        distances.slice(0,required).forEach(({dist,ox,oy})=>{
          if(dist>coherenceInch*inchPx){
            ctx.save();
            ctx.strokeStyle="#f97316";ctx.lineWidth=1;
            ctx.setLineDash([3,4]);ctx.globalAlpha=0.7;
            ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(ox,oy);ctx.stroke();
            ctx.setLineDash([]);
            // Indicador en la mini fuera de coherencia
            ctx.beginPath();ctx.arc(cx,cy,bsz+2,0,Math.PI*2);
            ctx.strokeStyle="#f97316";ctx.lineWidth=1.5;ctx.globalAlpha=0.9;ctx.stroke();
            ctx.restore();
          }
        });
      }
    });
  });
}

function groupCentroid(circles){
  let wx=0,wy=0,totalW=0;
  circles.forEach(({cx,cy,rad})=>{
    const w=rad*rad; // peso proporcional al área
    wx+=cx*w;wy+=cy*w;totalW+=w;
  });
  return totalW>0?{cx:wx/totalW,cy:wy/totalW}:{cx:circles[0].cx,cy:circles[0].cy};
}

// Devuelve {cx,cy} del centroide del grupo de movimiento (para colocar overlays)
// y dibuja las auras fusionadas. fillMode: "fill" | "border"
function drawMergedAuras(ctx,minis,players,W,H,BW,t,activeAuras,auraColors,selMini,fillMode){
  if(!activeAuras.move&&!activeAuras.charge&&!activeAuras.shoot&&!activeAuras.abilities&&!activeAuras.engage) return {};
  const inchPx=W/BW;
  const groups={};

  // TODO-3 FIX: clave incluye playerId para separar auras de cada jugador
  const addCircle=(key,cx,cy,rad,color,label,dash,lineW,pid,opacity=1)=>{
    const fk=`${pid||'x'}_${key}`;
    const dp=dash?playerDash(pid):[0];
    if(!groups[fk])groups[fk]={circles:[],color,label,dash,lineW,dashPattern:dp,opacity};
    groups[fk].circles.push({cx,cy,rad});
  };

  // Diferenciación por jugador: tinte muy sutil (15%) para no distorsionar el color de aura
  // La diferenciación principal viene del agrupamiento separado por playerId
  const tintAura=(auraCol,playerCol)=>{
    if(!playerCol) return auraCol;
    const [ar,ag,ab]=h2p(auraCol),[pr,pg,pb]=h2p(playerCol);
    const m=(a,b,f)=>Math.round(a*(1-f)+b*f).toString(16).padStart(2,'0');
    return `#${m(ar,pr,0.15)}${m(ag,pg,0.15)}${m(ab,pb,0.15)}`;
  };

  // Patrón de dash por jugador (J1 = [5,7], J2 = [3,5], etc.)
  const playerDash=(pid)=>{
    const patterns=[[5,7],[2,5],[7,3],[4,8]];
    const idx=players.findIndex(p=>p.id===pid);
    return patterns[Math.max(0,idx)%patterns.length];
  };

  minis.forEach(mini=>{
    const unit=mini.unitData;if(!unit)return;
    const player=players.find(p=>p.id===mini.playerId);
    const pid=mini.playerId,pc=player?.color;
    const cx=mini.x*W,cy=mini.y*H;
    const bsz=(unit.base_size_mm/2/25.4)*inchPx;
    const mv=parseInt(unit.stats?.M)||6;
    if(activeAuras.engage){
      addCircle(`engage_${Math.round(bsz+inchPx)}`,cx,cy,bsz+inchPx,tintAura("#f43f5e",pc),'ER 1"',false,1.5,pid);
    }
    if(activeAuras.shoot){
      const mr=Math.max(0,...(unit.ranged_weapons||[]).map(w=>w.range_inches||0));
      if(mr>0) addCircle(`shoot_${Math.round(bsz+mr*inchPx)}`,cx,cy,bsz+mr*inchPx,tintAura(auraColors.shoot,pc),`AD ${mr}"`,true,1,pid);
    }
    if(activeAuras.move){
      const rad=bsz+mv*inchPx;
      addCircle(`move_${Math.round(rad)}`,cx,cy,rad,tintAura(auraColors.move,pc),`M ${mv}"`,true,1.5,pid);
    }
    if(activeAuras.charge){
      // TODO-15: 11 círculos con probabilidad 2D6 (resultado 2 al 12)
      // Probabilidades: nº de combinaciones / 36
      const D2_PROB=[0,0,1,2,3,4,5,6,5,4,3,2,1]; // índice = resultado dado
      const maxProb=6; // resultado 7 tiene prob máxima
      D2_PROB.forEach((prob,result)=>{
        if(!prob)return;
        const rad=bsz+(mv+result)*inchPx;
        const opacity=prob/maxProb; // 0.17 a 1.0
        const isMedian=result===7;
        // Usar clave única por resultado para que NO se fusionen entre sí
        addCircle(`charge_r${result}_${pid}`,cx,cy,rad,
          tintAura(auraColors.charge,pc),
          isMedian?`C ${result}"`:"",  // etiqueta solo en el 7 (mediana)
          true,
          isMedian?1.5:0.6,  // el 7 más grueso
          pid,
          opacity  // opacidad proporcional a probabilidad
        );
      });
    }
    if(activeAuras.abilities){
      (unit.abilities||[]).forEach(ab=>{
        if(!ab.aura||!ab.aura.radius_inches)return;
        const col=ab.aura.color||auraColors.abilities;
        const rad=bsz+ab.aura.radius_inches*inchPx;
        addCircle(`hab_${ab.name}_${col}`,cx,cy,rad,col,ab.aura.display_text,false,1.5,pid);
      });
    }
  });

  const moveCentroids=[];

  Object.entries(groups).forEach(([key,{circles,color,label,dash,lineW,dashPattern,opacity=1}])=>{
    if(!circles.length)return;
    const [r,g,b]=h2p(color);
    const isMoveGroup=key.includes('_move_');
    const centroid=groupCentroid(circles);
    if(isMoveGroup) moveCentroids.push({...centroid,rad:circles[0].rad,circles});

    ctx.save();

    if(fillMode==='fill'){
      ctx.globalAlpha=0.07*opacity;ctx.fillStyle=`rgb(${r},${g},${b})`;
      circles.forEach(({cx,cy,rad})=>{ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fill();});
      ctx.globalAlpha=1;
    }

    const bw=Math.max(1.5,lineW*2);
    const bOff=document.createElement('canvas');
    bOff.width=W;bOff.height=H;
    const bctx=bOff.getContext('2d');
    bctx.fillStyle='#fff';
    circles.forEach(({cx,cy,rad})=>{bctx.beginPath();bctx.arc(cx,cy,rad,0,Math.PI*2);bctx.fill();});
    bctx.globalCompositeOperation='destination-out';
    circles.forEach(({cx,cy,rad})=>{bctx.beginPath();bctx.arc(cx,cy,Math.max(0,rad-bw),0,Math.PI*2);bctx.fill();});
    bctx.globalCompositeOperation='source-in';
    bctx.fillStyle=color;bctx.fillRect(0,0,W,H);
    ctx.shadowColor=color;ctx.shadowBlur=fillMode==='border'?8:4;
    ctx.globalAlpha=opacity;
    ctx.drawImage(bOff,0,0);ctx.shadowBlur=0;ctx.globalAlpha=1;

    if(dash){
      if(fillMode==='border'){
        // TODO-6 FIX: dash solo sobre el borde exterior fusionado usando máscara offscreen
        const dOff=document.createElement('canvas');
        dOff.width=W;dOff.height=H;
        const dctx=dOff.getContext('2d');
        dctx.fillStyle='#fff';
        circles.forEach(({cx,cy,rad})=>{dctx.beginPath();dctx.arc(cx,cy,rad,0,Math.PI*2);dctx.fill();});
        dctx.globalCompositeOperation='destination-out';
        circles.forEach(({cx,cy,rad})=>{dctx.beginPath();dctx.arc(cx,cy,Math.max(0,rad-bw*2),0,Math.PI*2);dctx.fill();});
        dctx.globalCompositeOperation='source-in';
        dctx.strokeStyle=color;dctx.lineWidth=lineW*1.5;
        dctx.setLineDash(dashPattern||[5,7]);dctx.lineDashOffset=-(t*15)%12;
        circles.forEach(({cx,cy,rad})=>{dctx.beginPath();dctx.arc(cx,cy,rad,0,Math.PI*2);dctx.stroke();});
        dctx.setLineDash([]);
        ctx.drawImage(dOff,0,0);
      } else {
        ctx.globalAlpha=0.85*opacity;ctx.strokeStyle=color;ctx.lineWidth=lineW;
        ctx.setLineDash(dashPattern||[5,7]);ctx.lineDashOffset=-(t*15)%12;
        circles.forEach(({cx,cy,rad})=>{ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.stroke();});
        ctx.setLineDash([]);ctx.globalAlpha=1;
      }
    }

    if(label){
      ctx.font='bold 9px \'Rajdhani\',monospace';
      ctx.fillStyle=color;ctx.textAlign='left';ctx.textBaseline='middle';
      const first=circles[0];
      // TODO-12 FIX: clampear la posición del texto dentro del tablero
      const PAD=4;
      const tx=Math.min(first.cx+first.rad*0.7+3, W-50);
      const ty=Math.max(PAD+4, Math.min(first.cy-first.rad*0.7, H-PAD));
      ctx.fillText(label,tx,ty);
    }
    ctx.restore();
  });

  return {moveCentroids};
}

     ctx.beginPath();ctx.moveTo(-s*0.12,-s*0.12);ctx.bezierCurveTo(-s*0.35,-s*0.55,-s*0.1,-s*0.75,s*0.1,-s*0.55);ctx.stroke();
     ctx.beginPath();ctx.moveTo(s*0.12,-s*0.12);ctx.bezierCurveTo(s*0.35,-s*0.55,s*0.1,-s*0.75,-s*0.1,-s*0.55);ctx.stroke();
     ctx.lineWidth=sz*0.04;
     ctx.beginPath();ctx.moveTo(-s*0.16,0);ctx.bezierCurveTo(-s*0.55,-s*0.2,-s*0.7,s*0.15,-s*0.45,s*0.4);ctx.stroke();
     ctx.beginPath();ctx.moveTo(s*0.16,0);ctx.bezierCurveTo(s*0.55,-s*0.2,s*0.7,s*0.15,s*0.45,s*0.4);ctx.stroke();
     ctx.beginPath();ctx.moveTo(0,s*0.18);ctx.bezierCurveTo(-s*0.1,s*0.5,s*0.25,s*0.65,s*0.1,s*0.8);ctx.stroke();
     ctx.restore();
   }},
];

function renderArucoMarker(canvas,faction,id){
  const SZ=240;canvas.width=SZ;canvas.height=SZ;
  const ctx=canvas.getContext("2d");
  const CELL=SZ/6,B=CELL;
  // Fondo blanco (borde exterior del ArUco)
  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,SZ,SZ);
  // Interior negro
  ctx.fillStyle="#000000";ctx.fillRect(B*0.4,B*0.4,SZ-B*0.8,SZ-B*0.8);
  // Bits 4x4
  const bits=ARUCO_4X4[id];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    ctx.fillStyle=bits[r][c]===1?"#ffffff":"#000000";
    ctx.fillRect(B+c*CELL+1,B+r*CELL+1,CELL-2,CELL-2);
  }
  // Símbolo semitransparente
  ctx.globalAlpha=0.2;faction.draw(ctx,SZ/2,SZ/2,SZ);ctx.globalAlpha=1;
  // Borde decorativo facción
  ctx.strokeStyle=faction.color;ctx.lineWidth=3;ctx.globalAlpha=0.55;
  ctx.strokeRect(3,3,SZ-6,SZ-6);ctx.globalAlpha=1;
  // ID
  ctx.fillStyle=faction.color;ctx.font="bold 11px monospace";
  ctx.textAlign="right";ctx.textBaseline="bottom";
  ctx.fillText(`ID:${id}`,SZ-5,SZ-3);
}

function OverlayManager({overlays,setOverlays,players}){
  const fileRef=useRef(null);
  const [selId,setSelId]=useState(null);

  // TODO-4: Persistir overlays en localStorage (src en base64)
  const STORAGE_KEY='wargame_overlays_v1';

  const saveToStorage=(list)=>{
    try{
      // Guardar solo los campos necesarios (src puede ser grande — base64)
      const toSave=list.map(o=>({id:o.id,name:o.name,src:o.src,playerId:o.playerId,opacity:o.opacity,visible:o.visible}));
      localStorage.setItem(STORAGE_KEY,JSON.stringify(toSave));
    }catch(e){console.warn('Overlay storage error:',e);}
  };

  const addOverlay=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const id=`ov_${Date.now()}`;
      const newOv={id,name:file.name.replace(/\.[^.]+$/,""),src:ev.target.result,playerId:null,opacity:70,visible:true};
      setOverlays(prev=>{
        const next=[...prev,newOv];
        saveToStorage(next);
        return next;
      });
      setSelId(id);
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };

  const update=(id,key,val)=>setOverlays(prev=>{
    const next=prev.map(o=>o.id===id?{...o,[key]:val}:o);
    saveToStorage(next);
    return next;
  });

  const remove=(id)=>{
    setOverlays(prev=>{
      const next=prev.filter(o=>o.id!==id);
      saveToStorage(next);
      return next;
    });
    if(selId===id)setSelId(null);
  };

  const sel=overlays.find(o=>o.id===selId);

  return(
    <div>
      {/* Lista de overlays */}
      {overlays.length>0&&(
        <div style={{marginBottom:10}}>
          {overlays.map(ov=>(
            <div key={ov.id} onClick={()=>setSelId(ov.id===selId?null:ov.id)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",
                background:selId===ov.id?"rgba(249,115,22,0.08)":C.bg,
                border:`1px solid ${selId===ov.id?C.accent:C.border}`,
                borderRadius:2,marginBottom:4,cursor:"pointer",transition:"all .2s"}}>
              {/* Miniatura */}
              <div style={{width:28,height:28,borderRadius:2,overflow:"hidden",flexShrink:0,
                background:"#111",border:`1px solid ${C.border}`}}>
                <img src={ov.src} style={{width:"100%",height:"100%",objectFit:"contain"}} alt=""/>
              </div>
              <span style={{flex:1,fontSize:12,color:selId===ov.id?C.accent:C.text,
                letterSpacing:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {ov.name}
              </span>
              {/* Toggle visible */}
              <button onClick={e=>{e.stopPropagation();update(ov.id,"visible",!ov.visible);}}
                style={{padding:"2px 6px",background:"transparent",border:`1px solid ${ov.visible?C.green:C.border}`,
                  borderRadius:2,cursor:"pointer",color:ov.visible?C.green:C.muted,
                  fontFamily:"'Rajdhani',monospace",fontSize:11,fontWeight:700}}>
                {ov.visible?"ON":"OFF"}
              </button>
              <button onClick={e=>{e.stopPropagation();remove(ov.id);}}
                style={{padding:"2px 5px",background:"transparent",border:`1px solid ${C.border}`,
                  borderRadius:2,cursor:"pointer",color:C.muted,fontFamily:"'Rajdhani',monospace",fontSize:12}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=C.red}
                onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>✕</button>
            </div>
          ))}
        </div>
      )}

      {/* Controles del overlay seleccionado */}
      {sel&&(
        <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:2,
          padding:10,marginBottom:10}} className="fade-in">
          <div style={{fontSize:12,color:C.accent,letterSpacing:2,marginBottom:8}}>
            AJUSTAR — {sel.name.toUpperCase()}
          </div>
          {/* Selector jugador */}
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,color:C.muted,letterSpacing:1,marginBottom:5}}>MOSTRAR EN MINIS DE</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <button onClick={()=>update(sel.id,"playerId",null)}
                style={{padding:"3px 8px",background:sel.playerId===null?"rgba(56,189,248,.1)":"transparent",
                  border:`1px solid ${sel.playerId===null?C.blue:C.border}`,borderRadius:2,cursor:"pointer",
                  color:sel.playerId===null?C.blue:C.muted,fontFamily:"'Rajdhani',monospace",fontSize:11,fontWeight:700}}>
                TODOS
              </button>
              {players.map(p=>(
                <button key={p.id} onClick={()=>update(sel.id,"playerId",p.id)}
                  style={{padding:"3px 8px",background:sel.playerId===p.id?`rgba(${h2rgb(p.color)},.1)`:"transparent",
                    border:`1px solid ${sel.playerId===p.id?p.color:C.border}`,borderRadius:2,cursor:"pointer",

        onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,.08)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        + AÑADIR IMAGEN
      </button>

      <div style={{marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:11,color:C.muted,letterSpacing:1}}>
          PNG, JPG, SVG, WebP · {overlays.length>0?`${overlays.length} guardada${overlays.length>1?"s":""} en local`:"Se guardan automáticamente"}
        </span>
        {overlays.length>0&&(
          <button onClick={()=>{setOverlays([]);localStorage.removeItem('wargame_overlays_v1');setSelId(null);}}
            style={{padding:"2px 7px",background:"transparent",border:`1px solid ${C.border}`,
              borderRadius:2,cursor:"pointer",color:C.muted,fontFamily:"'Rajdhani',monospace",
              fontSize:10,letterSpacing:1}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.red;e.currentTarget.style.color=C.red;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;}}>
            LIMPIAR TODO
          </button>
        )}
      </div>
    </div>
  );
}

function ArucoGenerator(){
  const [selFaction,setSelFaction]=useState(ARUCO_FACTIONS[0]);
  const cr0=useRef(null),cr1=useRef(null),cr2=useRef(null),cr3=useRef(null);
  const canvasRefs=[cr0,cr1,cr2,cr3];

  useEffect(()=>{
    canvasRefs.forEach((ref,i)=>{
      if(ref.current)renderArucoMarker(ref.current,selFaction,i);
    });
  },[selFaction]);

  const download=(idx)=>{
    const c=canvasRefs[idx].current;if(!c)return;
    const a=document.createElement("a");
    a.download=`aruco_${selFaction.id}_${String.fromCharCode(65+idx)}_id${idx}.png`;
    a.href=c.toDataURL("image/png");a.click();

        {[0,1,2,3].map(i=>(
          <div key={i} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:2,padding:10,textAlign:"center"}}>
            <div style={{fontSize:11,color:selFaction.color,fontWeight:700,letterSpacing:1,marginBottom:4}}>
              {ARUCO_CORNERS[i]}

            <canvas ref={canvasRefs[i]}
              style={{width:100,height:100,display:"block",margin:"0 auto",imageRendering:"pixelated",border:`1px solid ${C.border}`}}/>
            <button onClick={()=>download(i)}
              style={{marginTop:6,padding:"3px 8px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,cursor:"pointer",color:C.muted,fontFamily:"'Rajdhani',monospace",fontSize:11,fontWeight:700,letterSpacing:1,transition:"all .2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.color=C.blue;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;}}>

      <button onClick={downloadAll}
        style={{width:"100%",padding:"8px",background:"transparent",border:`1px solid ${C.green}`,borderRadius:2,cursor:"pointer",color:C.green,fontFamily:"'Rajdhani',monospace",fontSize:11,fontWeight:700,letterSpacing:2,transition:"all .2s"}}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(34,197,94,.1)"}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error){
      return(
        <div style={{background:"#050d1a",color:"#f43f5e",padding:24,fontFamily:"monospace",fontSize:12,minHeight:"100vh"}}>
          <div style={{marginBottom:12,fontSize:14,fontWeight:700}}>ERROR DE RENDER</div>
          <div style={{background:"#0a0a0a",padding:12,borderRadius:4,whiteSpace:"pre-wrap",lineHeight:1.6}}>
            {this.state.error?.message}
            {'\n\n'}
            {this.state.error?.stack}
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
