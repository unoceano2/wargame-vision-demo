const CALIB_CORNERS=['↖ Superior Izquierda','↗ Superior Derecha','↘ Inferior Derecha','↙ Inferior Izquierda'];

function CameraCalibration(){
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);
  const [active,setActive]=useState(false);
  const [points,setPoints]=useState([]); // hasta 4 puntos {x,y} en px del canvas
  const [calibrated,setCalibrated]=useState(false);
  const [savedCalib,setSavedCalib]=useState(()=>{
    try{const s=localStorage.getItem(CALIB_KEY);return s?JSON.parse(s):null;}catch{return null;}
  });

  // Arrancar cámara
  const [cameras,setCameras]=useState([]);
  const [selCamId,setSelCamId]=useState('');

  // Enumerar cámaras disponibles
  useEffect(()=>{
    navigator.mediaDevices?.enumerateDevices().then(devs=>{
      const cams=devs.filter(d=>d.kind==='videoinput');
      setCameras(cams);
      if(cams.length>0&&!selCamId)setSelCamId(cams[0].deviceId);
    }).catch(()=>{});
  },[]);

  const startCamera=async()=>{
    try{
      // Intentar con el dispositivo seleccionado, o fallback sin restricciones
      const constraints=selCamId
        ?{video:{deviceId:{exact:selCamId},width:{ideal:1280},height:{ideal:720}}}
        :{video:{width:{ideal:1280},height:{ideal:720}}};
      const stream=await navigator.mediaDevices.getUserMedia(constraints);
      streamRef.current=stream;
      if(videoRef.current){
        videoRef.current.srcObject=stream;
        await videoRef.current.play();
      }
      setActive(true);setPoints([]);setCalibrated(false);
    }catch(e){alert('No se pudo acceder a la cámara: '+e.message);}
  };

  const stopCamera=()=>{
    streamRef.current?.getTracks().forEach(t=>t.stop());
    streamRef.current=null;setActive(false);setPoints([]);
  };

  useEffect(()=>()=>streamRef.current?.getTracks().forEach(t=>t.stop()),[]);

  // Ref para los puntos — el loop los lee sin re-montarse al cambiar estado
  const pointsRef=useRef([]);
  useEffect(()=>{pointsRef.current=points;},[points]);

  // Loop de animación — solo depende de active, nunca se interrumpe al marcar puntos
  useEffect(()=>{
    if(!active)return;
    let raf;
    const draw=()=>{
      const v=videoRef.current,c=canvasRef.current;
      if(!v||!c){raf=requestAnimationFrame(draw);return;}
      if(v.readyState>=2&&v.videoWidth>0){
        if(c.width!==v.videoWidth)c.width=v.videoWidth;
        if(c.height!==v.videoHeight)c.height=v.videoHeight;
        const ctx=c.getContext('2d');
        ctx.drawImage(v,0,0);
        const pts=pointsRef.current;
        pts.forEach((p,i)=>{
          ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);
          ctx.fillStyle='#f97316';ctx.fill();
          ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
          ctx.fillStyle='#fff';ctx.font='bold 12px Rajdhani,monospace';
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(i+1,p.x,p.y);
        });
        if(pts.length>1){
          ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
          pts.forEach(p=>ctx.lineTo(p.x,p.y));
          if(pts.length===4)ctx.closePath();
          ctx.strokeStyle='#f97316';ctx.lineWidth=1.5;ctx.setLineDash([5,5]);ctx.stroke();ctx.setLineDash([]);
        }
      }
      raf=requestAnimationFrame(draw);
    };
    raf=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(raf);
  },[active]); // ← solo active, no points

  const handleCanvasClick=(e)=>{
    if(points.length>=4)return;
    const rect=canvasRef.current.getBoundingClientRect();
    const scaleX=canvasRef.current.width/rect.width;
    const scaleY=canvasRef.current.height/rect.height;
    const x=(e.clientX-rect.left)*scaleX;
    const y=(e.clientY-rect.top)*scaleY;
    setPoints(prev=>[...prev,{x,y}]);
  };

  const undoPoint=()=>setPoints(prev=>prev.slice(0,-1));

  const saveCalibration=()=>{
    if(points.length!==4)return;
    const W=canvasRef.current.width,H=canvasRef.current.height;
    // Normalizar puntos a 0-1 del frame de la cámara
    const normalized=points.map(p=>({x:p.x/W,y:p.y/H}));
    const calib={points:normalized,camW:W,camH:H,date:new Date().toLocaleDateString()};
    localStorage.setItem(CALIB_KEY,JSON.stringify(calib));
    setSavedCalib(calib);setCalibrated(true);
    stopCamera();
  };

  const clearCalibration=()=>{
    localStorage.removeItem(CALIB_KEY);setSavedCalib(null);setCalibrated(false);
  };

  return(
    <div className="panel" style={{borderRadius:2,padding:14,marginBottom:10}}>
      <div style={{color:C.accent,fontSize:12,letterSpacing:2,marginBottom:10}}>CALIBRACIÓN DE CÁMARA</div>
      <div style={{fontSize:12,color:C.muted,lineHeight:1.5,marginBottom:10}}>
        Sin impresora ni marcadores. Apunta la cámara al tapete y haz click en las 4 esquinas para calibrar la proyección.
      </div>

      {/* Estado de calibración guardada */}
      {savedCalib&&!active&&(
        <div style={{background:"rgba(34,197,94,0.08)",border:"1px solid #22c55e44",borderRadius:2,padding:8,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:C.green,fontWeight:700,letterSpacing:1}}>✓ CALIBRADO</div>
            <div style={{fontSize:11,color:C.muted}}>{savedCalib.date} · {savedCalib.camW}×{savedCalib.camH}px</div>
          </div>
          <button onClick={clearCalibration} className="rb" style={{padding:"2px 8px",fontSize:11,color:C.red,borderColor:C.red}}>BORRAR</button>
        </div>
      )}

      {/* Visor de cámara */}
      {active&&(
        <div style={{marginBottom:10}}>
          <div style={{position:"relative",borderRadius:2,overflow:"hidden",border:`1px solid ${C.border}`,cursor:points.length<4?"crosshair":"default"}}>
            <video ref={videoRef} style={{position:"absolute",width:1,height:1,opacity:0,pointerEvents:"none"}} playsInline muted autoPlay/>
            <canvas ref={canvasRef} onClick={handleCanvasClick}
              style={{display:"block",width:"100%",height:"auto"}}/>
            {/* Instrucción actual */}
            <div style={{position:"absolute",top:8,left:8,background:"rgba(5,13,26,0.85)",
              padding:"4px 10px",borderRadius:2,fontSize:11,color:C.accent,fontWeight:700,letterSpacing:1}}>
              {points.length<4?`${points.length+1}/4 — Click en la esquina ${CALIB_CORNERS[points.length]}`:"✓ 4 esquinas marcadas — Guarda la calibración"}
            </div>
          </div>
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <button onClick={undoPoint} disabled={!points.length} className="rb"
              style={{padding:"4px 10px",fontSize:11,opacity:points.length?1:0.4}}>↩ DESHACER</button>
            <button onClick={saveCalibration} disabled={points.length!==4} className="rb"
              style={{padding:"4px 14px",fontSize:11,flex:1,
                borderColor:points.length===4?C.green:C.border,
                color:points.length===4?C.green:C.muted,
                background:points.length===4?"rgba(34,197,94,0.08)":"transparent"}}>
              {points.length===4?"✓ GUARDAR CALIBRACIÓN":`Marca ${4-points.length} esquina${4-points.length!==1?"s":""} más`}
            </button>
            <button onClick={stopCamera} className="rb" style={{padding:"4px 10px",fontSize:11,color:C.red,borderColor:C.red}}>✕</button>
          </div>
        </div>
      )}

      {!active&&(
        <div>
          {/* Selector de cámara si hay más de una */}
          {cameras.length>1&&(
            <div style={{marginBottom:8}}>
              <div style={{fontSize:11,color:C.muted,letterSpacing:1,marginBottom:5}}>CÁMARA</div>
              <select value={selCamId} onChange={e=>setSelCamId(e.target.value)}
                style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:2,
                  color:C.text,fontFamily:"'Rajdhani',monospace",fontSize:12,padding:"5px 8px",cursor:"pointer"}}>
                {cameras.map(c=>(
                  <option key={c.deviceId} value={c.deviceId}>
                    {c.label||`Cámara ${cameras.indexOf(c)+1}`}
                  </option>
                ))}
              </select>
            </div>
          )}
          <button onClick={startCamera}
            style={{width:"100%",padding:"9px",background:"transparent",
              border:`1px solid ${C.blue}`,borderRadius:2,cursor:"pointer",
              color:C.blue,fontFamily:"'Rajdhani',monospace",fontSize:11,
              fontWeight:700,letterSpacing:2,transition:"all .2s"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,.08)"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            {savedCalib?"↺ RECALIBRAR CÁMARA":"⊙ INICIAR CALIBRACIÓN"}
          </button>
        </div>
      )}

      {/* Info técnica de la calibración guardada */}
      {savedCalib&&(
        <div style={{marginTop:8,fontSize:11,color:C.muted,fontFamily:"'Share Tech Mono',monospace"}}>
          Esquinas: {savedCalib.points.map((p,i)=>
            `${i+1}:(${(p.x*100).toFixed(0)}%,${(p.y*100).toFixed(0)}%)`
          ).join(' · ')}
        </div>
      )}
    </div>
  );
}

function App(){
  const [activeSystem,setActiveSystem]=useState("wh40k");
  const [activeMode,setActiveMode]=useState("combat_patrol");
  const [players,setPlayers]=useState([{id:1,name:"JUGADOR I",color:PLAYER_COLORS[0]},{id:2,name:"JUGADOR II",color:PLAYER_COLORS[1]}]);
  const [playerPatrols,setPlayerPatrols]=useState({});
  const [unitStatus,setUnitStatus]=useState({});
  const [minis,setMinis]=useState([]);
  const [selMini,setSelMini]=useState(null);
  const [assignMenu,setAssignMenu]=useState(null);
  const [tab,setTab]=useState("TABLERO");
  const [activeAuras,setActiveAuras]=useState({move:false,charge:false,shoot:false,abilities:false,engage:false});
  const prevAuras=useRef({move:true,charge:true,shoot:true,abilities:true,engage:false});
  const [auraFillMode,setAuraFillMode]=useState("fill"); // "fill" | "border"
  const [activeZone,setActiveZone]=useState(null);
  const [showDeployMenu,setShowDeployMenu]=useState(false);
  const [showLegend,setShowLegend]=useState(false);
  const [tick,setTick]=useState(0);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const isPanning=useRef(false);
  const lastPan=useRef({x:0,y:0});
  const [selUnit,setSelUnit]=useState(null);
  const [patrols,setPatrols]=useState(EMBEDDED_PATROLS);
  // Overlays personalizados (logos, imágenes)
  // TODO-4: Cargar overlays persistidos desde localStorage al iniciar
  const [overlays,setOverlays]=useState(()=>{
    try{
      const saved=localStorage.getItem('wargame_overlays_v1');
      return saved?JSON.parse(saved):[];
    }catch{return[];}
  });
  const overlayImgCache=useRef({});
  // Colores de auras configurables
  const [auraColors,setAuraColors]=useState({
    move:"#22c55e",
    charge:"#a855f7",
    shoot:"#38bdf8",
    abilities:"#fbbf24",
    engage:"#f43f5e",
  });
  const [apiKey,setApiKey]=useState("");
  const [showApiKey,setShowApiKey]=useState(false);
  const [pdfLoading,setPdfLoading]=useState(false);
  const [pdfStatus,setPdfStatus]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef(null);
  const canvasRef=useRef(null);

  useEffect(()=>{const i=setInterval(()=>setTick(x=>x+1),80);return()=>clearInterval(i);},[]);
  useEffect(()=>{if(!showDeployMenu)return;const fn=()=>setShowDeployMenu(false);document.addEventListener('click',fn);return()=>document.removeEventListener('click',fn);},[showDeployMenu]);

  const changeSystem=(sys)=>{setActiveSystem(sys);setActiveMode(Object.keys(GAME_SYSTEMS[sys].modes)[0]);setPlayerPatrols({});setUnitStatus({});setMinis([]);};
  const changeMode=(mode)=>{setActiveMode(mode);setPlayerPatrols({});setUnitStatus({});setMinis([]);};

  const selectPatrol=(playerId,patrol)=>{
    setPlayerPatrols(prev=>({...prev,[playerId]:patrol}));
    // Estado por unidad: {deployed: 0, eliminated: 0, total: count}
    const initial={};
    (patrol.units||[]).forEach(u=>{
      initial[u.id]={deployed:0,eliminated:0,total:u.count||1};
    });
    setUnitStatus(prev=>({...prev,[playerId]:initial}));
    setMinis(prev=>prev.filter(m=>m.playerId!==playerId));
  };

  const deployUnit=(playerId,unit,patrol)=>{
    const st=unitStatus[playerId]?.[unit.id]||{deployed:0,eliminated:0,total:unit.count||1};
    if(st.deployed>=st.total)return; // ya todas desplegadas
    // Cada figura tiene su propio id único en el tablero
    const figIdx=st.deployed; // índice de esta figura
    const newMini={
      id:`mini_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
      unitData:{...unit,faction_keyword:patrol.faction_keyword},
      figureIndex:figIdx,
      x:playerId===1?0.05+Math.random()*0.18:0.77+Math.random()*0.18,
      y:0.05+Math.random()*0.9,
      playerId,
    };
    setMinis(prev=>[...prev,newMini]);
    setUnitStatus(prev=>({
      ...prev,
      [playerId]:{
        ...prev[playerId],
        [unit.id]:{...st,deployed:st.deployed+1},
      }
    }));
  };

  // TODO-10: Desplegar toda la unidad de golpe en cuadrícula con 2" de separación
  const deployAllUnit=(playerId,unit,patrol)=>{
    const st=unitStatus[playerId]?.[unit.id]||{deployed:0,eliminated:0,total:unit.count||1};
    const pending=Math.max(0,st.total-st.deployed-st.eliminated);
    if(!pending)return;
    const modeInfo=GAME_SYSTEMS[activeSystem].modes[activeMode];
    const BW=modeInfo.w; // ancho del tablero en pulgadas
    const BH=modeInfo.h;
    // Separación entre figuras: 1.5" (dentro de la coherencia de 2")
    const sepInch=1.5;
    const sepX=sepInch/BW; // en espacio normalizado (0-1)
    const sepY=sepInch/BH;
    // Punto de inicio: borde del jugador con margen
    const startX=playerId===1?0.04:0.96;
    const startY=0.05;
    const cols=playerId===1?Math.floor(0.2/sepX):Math.floor(0.2/sepX);
    const newMinis=[];
    for(let i=0;i<pending;i++){
      const col=i%Math.max(1,cols);
      const row=Math.floor(i/Math.max(1,cols));
      const x=playerId===1
        ?startX+col*sepX
        :startX-col*sepX;
      const y=startY+row*sepY;
      newMinis.push({
        id:`mini_${Date.now()}_${i}_${Math.random().toString(36).slice(2,6)}`,
        unitData:{...unit,faction_keyword:patrol.faction_keyword},
        figureIndex:st.deployed+i,
        x:Math.max(0.01,Math.min(0.99,x)),
        y:Math.max(0.01,Math.min(0.99,y)),
        playerId,
      });
    }
    setMinis(prev=>[...prev,...newMinis]);
    setUnitStatus(prev=>({
      ...prev,
      [playerId]:{
        ...prev[playerId],
        [unit.id]:{...st,deployed:st.deployed+pending},
      }
    }));
  };

  const eliminateUnit=(playerId,unitId,miniId)=>{
    // Eliminar la mini específica del tablero
    setMinis(prev=>prev.filter(m=>m.id!==miniId));
    // Incrementar contador de eliminadas
    setUnitStatus(prev=>{
      const st=prev[playerId]?.[unitId]||{deployed:1,eliminated:0,total:1};
      return{...prev,[playerId]:{...prev[playerId],[unitId]:{...st,deployed:Math.max(0,st.deployed-1),eliminated:st.eliminated+1}}};
    });
  };

  const removeMiniById=(miniId)=>{
    const mini=minis.find(m=>m.id===miniId);
    if(mini&&mini.playerId&&mini.unitData)eliminateUnit(mini.playerId,mini.unitData.id,miniId);
    else setMinis(prev=>prev.filter(m=>m.id!==miniId));
    setSelMini(null);setAssignMenu(null);
  };

  const sysInfo=GAME_SYSTEMS[activeSystem];
  const modeInfo=sysInfo.modes[activeMode];

  useEffect(()=>{
    if(tab!=="TABLERO")return;
    const canvas=canvasRef.current;if(!canvas)return;
    // Sincronizar tamaño interno con CSS para nitidez
    const dpr=window.devicePixelRatio||1;
    const cssW=canvas.clientWidth||700;
    const cssH=canvas.clientHeight||520;
    if(canvas.width!==Math.round(cssW*dpr)||canvas.height!==Math.round(cssH*dpr)){
      canvas.width=Math.round(cssW*dpr);
      canvas.height=Math.round(cssH*dpr);
    }
    const ctx=canvas.getContext("2d");
    ctx.setTransform(1,0,0,1,0,0);
    // W y H son siempre el tamaño CSS (en píxeles de dispositivo)
    const W=canvas.width/dpr,H=canvas.height/dpr;
    // Escalar para pantallas HiDPI
    ctx.scale(dpr,dpr);

    // Calcular fit-base: escala para que el tablero quepa en el canvas con 5% de margen
    const MARGIN=0.05;
    const BW=modeInfo.w,BH=modeInfo.h;
    const fitScale=Math.min(W*(1-MARGIN*2)/W, H*(1-MARGIN*2)/H);
    // fitScale siempre 1 aquí porque W/W=1 — lo que queremos es escalar el TABLERO (700×520) al canvas
    // Escala base: cuántos px del canvas por px lógico del tablero
    const baseScaleX=W/700;
    const baseScaleY=H/520;
    const baseScale=Math.min(baseScaleX,baseScaleY)*(1-MARGIN*2);
    // Offset para centrar el tablero en el canvas
    const boardW=700*baseScale;
    const boardH=520*baseScale;
    const baseOffX=(W-boardW)/2;
    const baseOffY=(H-boardH)/2;
    // Guardar para handlers de click/drag
    baseScaleRef.current=baseScale;
    baseOffRef.current={x:baseOffX,y:baseOffY};

    const t=tick*0.02;

    ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
    ctx.save();
    // Aplicar: centrado base + zoom/pan del usuario encima
    ctx.translate(baseOffX+pan.x,baseOffY+pan.y);
    ctx.scale(baseScale*zoom,baseScale*zoom);

    // Dimensiones lógicas del tablero (siempre 700×520 para todos los cálculos)
    const LW=700,LH=520;
    ctx.strokeStyle="rgba(14,42,74,0.5)";ctx.lineWidth=0.4/baseScale;
    for(let x=0;x<=LW;x+=LW/BW){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,LH);ctx.stroke();}
    for(let y=0;y<=LH;y+=LH/BH){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(LW,y);ctx.stroke();}
    if(activeZone)drawDeploymentZone(ctx,LW,LH,BW,BH,activeZone);
    // Borde completo del tablero
    ctx.strokeStyle=C.accent;ctx.lineWidth=1.5/baseScale;
    ctx.strokeRect(0,0,LW,LH);
    [[0,0],[LW,0],[0,LH],[LW,LH]].forEach(([x,y])=>{
      const s=20/baseScale,ox=x===0?1:-1,oy=y===0?1:-1;
      ctx.strokeStyle=C.accent;ctx.lineWidth=3/baseScale;
      ctx.beginPath();ctx.moveTo(x+ox*s,y);ctx.lineTo(x,y);ctx.lineTo(x,y+oy*s);ctx.stroke();
    });
    // Auras fusionadas — si hay selección múltiple, solo mostrar auras de las seleccionadas
    const aurasFor=selMinis.size>0?minis.filter(m=>selMinis.has(m.id)):minis;
    const {moveCentroids=[]}=drawMergedAuras(ctx,aurasFor,players,LW,LH,BW,t,activeAuras,auraColors,selMini,auraFillMode);
    // Minis encima
    minis.forEach(mini=>{const unit=mini.unitData;if(!unit)return;const player=players.find(p=>p.id===mini.playerId);drawUnit(ctx,mini,unit,player?.color,LW,LH,BW,selMini===mini.id||selMinis.has(mini.id),t,auraColors);});
    // TODO-8: Alertas de coherencia de unidad (2")
    drawCoherency(ctx,minis,LW,LH,BW);
    // Overlays personalizados — 1 símbolo por grupo fusionado, centrado en el centroide
    overlays.forEach(ov=>{
      if(!ov.visible||!ov.src)return;
      let img=overlayImgCache.current[ov.id];
      if(!img){img=new Image();img.src=ov.src;overlayImgCache.current[ov.id]=img;}
      if(!img.complete)return;
      const inchPx=LW/modeInfo.w;

      // Agrupar minis por grupo de movimiento — misma clave que drawMergedAuras (pid_move_rad)
      const minisByGroup={};
      minis.forEach(mini=>{
        if(ov.playerId && mini.playerId!==ov.playerId)return;
        const unit=mini.unitData;if(!unit)return;
        const bsz=(unit.base_size_mm/2/25.4)*inchPx;
        const mv=parseInt(unit.stats?.M)||6;
        const rad=bsz+mv*inchPx;
        const key=`${mini.playerId||'x'}_move_${Math.round(rad)}`;
        if(!minisByGroup[key])minisByGroup[key]=[];
        minisByGroup[key].push({mini,unit,rad});
      });

      // Por cada grupo, un símbolo centrado en el centroide — coordenadas en espacio LW×LH
      Object.values(minisByGroup).forEach(members=>{
        if(!members.length)return;
        const circles=members.map(({mini,rad})=>({cx:mini.x*LW,cy:mini.y*LH,rad}));
        const centroid=groupCentroid(circles);
        const rad=members[0].rad;
        const drawR=rad*0.82;
        const player=players.find(p=>p.id===members[0].mini.playerId);
        const col=player?.color||C.accent;
        const [r,g,b]=h2p(col);

        ctx.save();
        ctx.beginPath();ctx.arc(centroid.cx,centroid.cy,drawR,0,Math.PI*2);
        ctx.fillStyle=`rgba(${r},${g},${b},0.06)`;ctx.fill();
        ctx.beginPath();ctx.arc(centroid.cx,centroid.cy,drawR,0,Math.PI*2);ctx.clip();
        const iw=img.naturalWidth||img.width||100;
        const ih=img.naturalHeight||img.height||100;
        const aspect=iw/ih;
        let dw,dh;
        if(aspect>=1){dw=drawR*2;dh=dw/aspect;}
        else{dh=drawR*2;dw=dh*aspect;}
        const offSz=Math.ceil(Math.max(dw,dh));
        const off=document.createElement('canvas');
        off.width=offSz;off.height=offSz;
        const octx=off.getContext('2d');
        const ox=(offSz-dw)/2,oy=(offSz-dh)/2;
        octx.drawImage(img,ox,oy,dw,dh);
        octx.globalCompositeOperation='multiply';
        octx.fillStyle=col;octx.fillRect(0,0,offSz,offSz);
        octx.globalCompositeOperation='destination-in';
        octx.drawImage(img,ox,oy,dw,dh);
        ctx.globalAlpha=(ov.opacity/100)*0.8;
        ctx.drawImage(off,centroid.cx-offSz/2,centroid.cy-offSz/2,offSz,offSz);
        ctx.globalAlpha=1;
        ctx.restore();
      });
    });

    // Highlight de minis seleccionadas (selección múltiple)
    if(selMinis.size>0){
      minis.forEach(mini=>{
        if(!selMinis.has(mini.id))return;
        const unit=mini.unitData;if(!unit)return;
        const cx=mini.x*LW,cy=mini.y*LH;
        const inchPx=LW/BW;
        const bsz=(unit.base_size_mm/2/25.4)*inchPx;
        ctx.save();
        ctx.beginPath();ctx.arc(cx,cy,bsz+3,0,Math.PI*2);
        ctx.strokeStyle="#ffffff";ctx.lineWidth=2;ctx.setLineDash([3,3]);
        ctx.globalAlpha=0.8;ctx.stroke();
        ctx.setLineDash([]);ctx.globalAlpha=1;
        ctx.restore();
      });
    }

    // Rectángulo de selección en curso
    if(selRect){
      const rx=Math.min(selRect.x0,selRect.x1)*LW;
      const ry=Math.min(selRect.y0,selRect.y1)*LH;
      const rw=(Math.abs(selRect.x1-selRect.x0))*LW;
      const rh=(Math.abs(selRect.y1-selRect.y0))*LH;
      ctx.save();
      ctx.strokeStyle="#ffffff";ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.globalAlpha=0.7;ctx.strokeRect(rx,ry,rw,rh);
      ctx.fillStyle="rgba(255,255,255,0.06)";ctx.fillRect(rx,ry,rw,rh);
      ctx.setLineDash([]);ctx.globalAlpha=1;
      ctx.restore();
    }

    ctx.restore();
  },[tab,minis,players,selMini,selMinis,selRect,tick,activeAuras,activeZone,modeInfo,zoom,pan,overlays,auraFillMode,auraColors]);

  // Zoom con rueda del ratón
  // Zoom con rueda — centrado en el cursor
  const handleWheel=(e)=>{
    e.preventDefault();
    const factor=e.deltaY<0?1.15:1/1.15;
    const rect=canvasRef.current.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    const rawX=(e.clientX-rect.left)*(canvasRef.current.width/rect.width)/dpr;
    const rawY=(e.clientY-rect.top)*(canvasRef.current.height/rect.height)/dpr;
    const bo=baseOffRef.current;
    const cx=rawX-bo.x;const cy=rawY-bo.y;
    setZoom(prev=>{
      const nz=Math.max(0.5,Math.min(8,prev*factor));
      setPan(pp=>({x:cx-(cx-pp.x)*(nz/prev),y:cy-(cy-pp.y)*(nz/prev)}));
      return nz;
    });
  };

  const resetZoom=()=>{setZoom(1);setPan({x:0,y:0});};

  // TODO-5: ✅ COMPLETADO — Selector rectangular de múltiples minis con movimiento de grupo
  const [selMinis,setSelMinis]=useState(new Set());
  const [selRect,setSelRect]=useState(null);
  const isDrawingRect=useRef(false);
  const rectStart=useRef(null);
  const shiftRef=useRef(false); // para acumular selección con Shift al soltar rect
  const isDraggingMini=useRef(false);
  const isDraggingGroup=useRef(false);
  const groupDragStart=useRef(null);
  const mouseDownPos=useRef(null);
  const baseScaleRef=useRef(1);
  const baseOffRef=useRef({x:0,y:0});
  const DRAG_THRESHOLD=4;

  const eventToBoard=(e)=>{
    const rect=canvasRef.current.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    const rawX=(e.clientX-rect.left)*(canvasRef.current.width/rect.width)/dpr;
    const rawY=(e.clientY-rect.top)*(canvasRef.current.height/rect.height)/dpr;
    const bs=baseScaleRef.current,bo=baseOffRef.current;
    return{bx:Math.max(0,Math.min(1,((rawX-bo.x-pan.x)/(bs*zoom))/700)),by:Math.max(0,Math.min(1,((rawY-bo.y-pan.y)/(bs*zoom))/520)),rawX,rawY};
  };

  useEffect(()=>{
    const onKey=(e)=>{if(e.key==='Escape'){setSelMinis(new Set());setSelRect(null);setSelMini(null);setAssignMenu(null);}};
    document.addEventListener('keydown',onKey);
    return()=>document.removeEventListener('keydown',onKey);
  },[]);

  useEffect(()=>{
    const onUp=()=>{
      isPanning.current=false;isDraggingMini.current=false;isDraggingGroup.current=false;
      isDrawingRect.current=false;mouseDownPos.current=null;groupDragStart.current=null;
      if(selRect){
        const x0=Math.min(selRect.x0,selRect.x1),x1=Math.max(selRect.x0,selRect.x1);
        const y0=Math.min(selRect.y0,selRect.y1),y1=Math.max(selRect.y0,selRect.y1);
        const inside=new Set(minis.filter(m=>m.x>=x0&&m.x<=x1&&m.y>=y0&&m.y<=y1).map(m=>m.id));
        if(inside.size>0){
          if(shiftRef.current)setSelMinis(prev=>new Set([...prev,...inside]));
          else setSelMinis(inside);
        } else if(!shiftRef.current) setSelMinis(new Set());
        setSelRect(null);
      }
    };
    document.addEventListener('mouseup',onUp);
    return()=>document.removeEventListener('mouseup',onUp);
  },[selRect,minis]);

  const handleMouseDown=(e)=>{
    mouseDownPos.current={x:e.clientX,y:e.clientY};
    isDraggingMini.current=false;isDraggingGroup.current=false;isDrawingRect.current=false;
    const {bx,by,rawX,rawY}=eventToBoard(e);
    const bs=baseScaleRef.current,bo=baseOffRef.current;
    let closest=null,minDist=0.06/(bs*zoom);
    minis.forEach(m=>{const d=Math.hypot(m.x-bx,m.y-by);if(d<minDist){minDist=d;closest=m;}});
    if(closest){
      if(e.shiftKey){
        // Shift+click: añadir/quitar de la selección múltiple
        setSelMinis(prev=>{
          const next=new Set(prev);
          if(next.has(closest.id))next.delete(closest.id);
          else next.add(closest.id);
          return next;
        });
        setSelMini(null);setAssignMenu(null);
      } else if(selMinis.has(closest.id)){
        // Click en mini ya seleccionada → preparar drag de grupo
        isDraggingGroup.current=true;
        groupDragStart.current={bx,by,positions:Object.fromEntries(minis.filter(m=>selMinis.has(m.id)).map(m=>[m.id,{x:m.x,y:m.y}]))};
      } else {
        // Click normal → selección individual
        setSelMinis(new Set());setSelMini(closest.id);setAssignMenu(null);isDraggingMini.current=true;
      }
    } else {
      setSelMini(null);setAssignMenu(null);
      if(selMinis.size>0){setSelMinis(new Set());return;}
      isDrawingRect.current=true;rectStart.current={bx,by};
      shiftRef.current=e.shiftKey;
      setSelRect({x0:bx,y0:by,x1:bx,y1:by});
      isPanning.current=true;
      lastPan.current={x:rawX-bo.x-pan.x,y:rawY-bo.y-pan.y};
    }
  };

  const handleMouseMove=(e)=>{
    if(!e.buttons){isPanning.current=false;isDraggingMini.current=false;isDraggingGroup.current=false;isDrawingRect.current=false;return;}
    const moved=mouseDownPos.current&&Math.hypot(e.clientX-mouseDownPos.current.x,e.clientY-mouseDownPos.current.y)>DRAG_THRESHOLD;
    const {bx,by,rawX,rawY}=eventToBoard(e);
    if(isDraggingGroup.current&&moved&&groupDragStart.current){
      const dx=bx-groupDragStart.current.bx,dy=by-groupDragStart.current.by;
      setMinis(prev=>prev.map(m=>{
        if(!selMinis.has(m.id))return m;
        const orig=groupDragStart.current.positions[m.id];
        return{...m,x:Math.max(0,Math.min(1,orig.x+dx)),y:Math.max(0,Math.min(1,orig.y+dy))};
      }));
      return;
    }
    if(selMini&&isDraggingMini.current&&moved){handleCanvasDrag(e);return;}
    if(isDrawingRect.current&&moved&&rectStart.current){
      isPanning.current=false;
      setSelRect({x0:rectStart.current.bx,y0:rectStart.current.by,x1:bx,y1:by});
      return;
    }
    if(!isPanning.current||!moved)return;
    const bo=baseOffRef.current;
    setPan({x:rawX-bo.x-lastPan.current.x,y:rawY-bo.y-lastPan.current.y});
  };

  const handleMouseUp=()=>{isPanning.current=false;isDraggingMini.current=false;mouseDownPos.current=null;};

  const handleCanvasClick=(e)=>{
    const {bx,by}=eventToBoard(e);
    const rect=canvasRef.current.getBoundingClientRect();
    const bs=baseScaleRef.current;
    let closest=null,minDist=0.06/(bs*zoom);
    minis.forEach(m=>{const d=Math.hypot(m.x-bx,m.y-by);if(d<minDist){minDist=d;closest=m;}});
    if(closest){setSelMini(closest.id);setAssignMenu({miniId:closest.id,x:e.clientX-rect.left,y:e.clientY-rect.top});}
    else{setSelMini(null);setAssignMenu(null);}
  };

  const handleCanvasDrag=(e)=>{
    if(!selMini)return;
    const {bx,by}=eventToBoard(e);
    setMinis(prev=>prev.map(m=>m.id===selMini?{...m,x:bx,y:by}:m));
    setAssignMenu(null);
  };

  const gameStats=useMemo(()=>{
    const stats={};
    players.forEach(p=>{
      const patrol=playerPatrols[p.id];
      const status=unitStatus[p.id]||{};
      const units=patrol?.units||[];
      let totalFigs=0,deployedFigs=0,eliminatedFigs=0,pendingFigs=0;
      units.forEach(u=>{
        const st=status[u.id]||{deployed:0,eliminated:0,total:u.count||1};
        totalFigs+=st.total;
        deployedFigs+=st.deployed;
        eliminatedFigs+=st.eliminated;
        pendingFigs+=(st.total-st.deployed-st.eliminated);
      });
      stats[p.id]={
        total:totalFigs,
        deployed:deployedFigs,
        eliminated:eliminatedFigs,
        pending:pendingFigs,
        units:units.length,
      };
    });
    return stats;
  },[players,playerPatrols,unitStatus]);

  const processPDF=async(file)=>{
    if(!apiKey){setPdfStatus({type:"error",msg:"Introduce tu API key en CONFIG."});return;}
    setPdfLoading(true);setPdfStatus({type:"info",msg:`Procesando: ${file.name}...`});
    try{
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Error leyendo archivo"));r.readAsDataURL(file);});
      const prompt=`Analiza este PDF de Combat Patrol de Warhammer 40,000 y extrae los datos en formato JSON.\n\nEstructura requerida:\n{\n  "id": "string_sin_espacios",\n  "system": "wh40k",\n  "game_mode": "combat_patrol",\n  "faction": "Nombre Facción",\n  "faction_keyword": "Keyword",\n  "patrol_name": "Nombre",\n  "faction_ability": {"name":"...","description":"..."},\n  "enhancements": {"default":{"name":"...","description":"..."},"optional":{"name":"...","description":"..."}},\n  "secondary_objectives": {"default":{"name":"...","description":"..."},"optional":{"name":"...","description":"..."}},\n  "stratagems": [{"name":"...","cost_cp":1,"when":"...","effect":"..."}],\n  "units": [{"id":"string_id","name":"...","role":"warlord|battleline|troops|elite|fast_attack|heavy_support|support","count":1,"keywords":[],"stats":{"M":"6\\"","T":4,"SV":"3+","W":2,"LD":"6+","OC":1},"invulnerable_save":null,"base_size_mm":32,"base_type":"round|oval","ranged_weapons":[{"name":"...","keywords":[],"range_inches":24,"attacks":2,"skill":"3+","strength":4,"AP":0,"damage":1}],"melee_weapons":[{"name":"...","keywords":[],"range_inches":0,"attacks":3,"skill":"3+","strength":4,"AP":0,"damage":1}],"abilities":[{"name":"...","type":"core|faction|special","description":"...","aura":null}]}]\n}\n\nPara el campo aura: inclúyelo solo si la habilidad tiene efecto de área visible en tablero. Formato: {"type":"buff|synapse|denial|debuff","radius_inches":6,"affects":"unit","display_text":"Texto corto","color":"#hex"}. Color sugerido: buff=#fbbf24, synapse=#a855f7, denial=#f43f5e.\nResponde SOLO con JSON válido, sin markdown.`;
      const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]}]})});
      if(!response.ok){const e=await response.json();throw new Error(e.error?.message||`HTTP ${response.status}`);}
      const data=await response.json();
      const raw=data.content.map(c=>c.text||"").join("").trim();
      const clean=raw.replace(/^```json?\s*/,"").replace(/```\s*$/,"").trim();
      const parsed=JSON.parse(clean);
      if(!parsed.units||!Array.isArray(parsed.units))throw new Error("Falta campo 'units'");
      const exists=patrols.find(p=>p.id===parsed.id);
      if(exists)setPatrols(prev=>prev.map(p=>p.id===parsed.id?parsed:p));
      else setPatrols(prev=>[...prev,parsed]);
      setPdfStatus({type:"success",msg:`✓ ${parsed.patrol_name} importada (${parsed.units.length} unidades)`});
    }catch(err){setPdfStatus({type:"error",msg:`Error: ${err.message}`});}
    finally{setPdfLoading(false);}
  };

  const handleFileInput=(e)=>{const f=e.target.files[0];if(f&&f.type==="application/pdf")processPDF(f);};
  const handleDrop=(e)=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f&&f.type==="application/pdf")processPDF(f);};

  const unassigned=minis.filter(m=>!m.playerId).length;

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Rajdhani',monospace",color:C.text}}>

      {/* Header */}
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"8px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"relative"}}>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:"1px",background:`linear-gradient(90deg,transparent,${C.accent},transparent)`,opacity:.4}}/>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:C.accent,boxShadow:`0 0 7px ${C.accent}`}} className="pulse"/>
          <span style={{fontWeight:700,fontSize:15,letterSpacing:3,color:C.accent}}>WARGAME</span>
          <span style={{fontWeight:400,fontSize:15,letterSpacing:3,color:C.text}}>VISION SYS</span>
          <span style={{color:C.muted,fontSize:11,letterSpacing:1}}>// v3.0</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",gap:4}}>
            {Object.entries(GAME_SYSTEMS).map(([key,sys])=>(
              <button key={key} onClick={()=>changeSystem(key)} className={`rb ${activeSystem===key?"bon":""}`}
                style={{padding:"3px 9px",fontSize:12,letterSpacing:1,borderColor:activeSystem===key?sys.color:C.border,color:activeSystem===key?sys.color:C.muted}}>
                {sys.short}
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted,letterSpacing:1}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:C.green,display:"inline-block",boxShadow:`0 0 6px ${C.green}`}}/>
            PROTOTIPO
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.panel}}>
        {TABS.map((t,i)=>(
          <button key={t} className={`rb ${tab===t?"on":""}`} onClick={()=>setTab(t)}
            style={{padding:"9px 18px",borderRadius:0,fontSize:11,letterSpacing:2,borderLeft:i>0?`1px solid ${C.border}`:"none",borderTop:"none",borderRight:"none",borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent"}}>
            {t}
            {t==="JUEGO"&&Object.keys(playerPatrols).length>0&&(
              <span style={{marginLeft:5,fontSize:11,color:C.green,background:"rgba(34,197,94,.1)",padding:"1px 5px",borderRadius:2}}>{Object.keys(playerPatrols).length}</span>
            )}
          </button>
        ))}
      </div>

      {/* ══ TABLERO ══ */}
      {tab==="TABLERO"&&(
        <div style={{padding:14,display:"flex",gap:14,height:"calc(100vh - 110px)",overflow:"hidden"}}>
          <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{marginBottom:8,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              {[{key:"move",label:"M"},{key:"charge",label:"C"},{key:"shoot",label:"AD"},{key:"abilities",label:"HAB"},{key:"engage",label:"ER",defaultColor:C.red}].map(({key,label,defaultColor})=>{
                const color=key==="engage"?(auraColors.engage||defaultColor):auraColors[key]||C.green;
                const [r,g,b]=h2p(color);
                return(<button key={key} onClick={()=>setActiveAuras(prev=>({...prev,[key]:!prev[key]}))}
                  style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:2,cursor:"pointer",border:`1px solid ${activeAuras[key]?color:C.border}`,background:activeAuras[key]?`rgba(${r},${g},${b},.1)`:"transparent",color:activeAuras[key]?color:C.muted,fontFamily:"'Rajdhani',monospace",fontSize:11,fontWeight:700,letterSpacing:1,transition:"all .2s"}}>
                  <div style={{width:5,height:5,borderRadius:"50%",background:activeAuras[key]?color:C.muted}}/>{label}
                </button>);
              })}
              <button onClick={()=>setShowLegend(true)} className="rb" style={{padding:"3px 8px",fontSize:11,borderColor:C.blue,color:C.blue}}>? ÍNDICE</button>
              {/* Toggle global auras */}
              <button onClick={()=>{
                const anyOn=Object.values(activeAuras).some(Boolean);
                if(anyOn){prevAuras.current={...activeAuras};setActiveAuras({move:false,charge:false,shoot:false,abilities:false});}
                else setActiveAuras({...prevAuras.current});
              }} className="rb" style={{padding:"3px 10px",fontSize:11,
                borderColor:Object.values(activeAuras).some(Boolean)?"#f43f5e44":C.green,
                color:Object.values(activeAuras).some(Boolean)?"#f43f5e":C.green,
                background:Object.values(activeAuras).some(Boolean)?"rgba(244,63,94,0.05)":"rgba(34,197,94,0.05)"}}>
                {Object.values(activeAuras).some(Boolean)?"◉ OCULTAR":"○ AURAS"}
              </button>
              {/* Toggle modo relleno / solo borde */}
              <button onClick={()=>setAuraFillMode(m=>m==="fill"?"border":"fill")}
                className="rb" style={{padding:"3px 10px",fontSize:11,
                  borderColor:auraFillMode==="border"?C.yellow:C.border,
                  color:auraFillMode==="border"?C.yellow:C.muted,
                  background:auraFillMode==="border"?"rgba(251,191,36,0.06)":"transparent"}}>
                {auraFillMode==="border"?"◻ CONTORNO":"◼ RELLENO"}
              </button>
              <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>setShowDeployMenu(v=>!v)} className="rb" style={{padding:"3px 8px",fontSize:11,borderColor:activeZone?C.green:C.border,color:activeZone?C.green:C.muted,background:activeZone?"rgba(34,197,94,.1)":"transparent"}}>
                  ⬡ DESPLIEGUE{activeZone?` — ${DEPLOY_ZONES[activeZone].label}`:""}
                </button>
                {showDeployMenu&&(
                  <div style={{position:"absolute",top:"110%",left:0,zIndex:20,background:C.panel,border:`1px solid ${C.border}`,borderRadius:2,padding:8,minWidth:240,boxShadow:"0 0 20px rgba(0,0,0,0.5)"}}>
                    <div style={{fontSize:12,color:C.muted,letterSpacing:2,marginBottom:8}}>ZONA DE DESPLIEGUE</div>
                    {Object.entries(DEPLOY_ZONES).map(([key,{label,desc}])=>(
                      <button key={key} onClick={()=>{setActiveZone(activeZone===key?null:key);setShowDeployMenu(false);}}
                        style={{display:"block",width:"100%",textAlign:"left",padding:"6px 8px",background:activeZone===key?"rgba(34,197,94,.12)":"transparent",border:"none",borderRadius:2,cursor:"pointer",marginBottom:2,color:activeZone===key?C.green:C.text,fontFamily:"'Rajdhani',monospace",fontSize:11,fontWeight:600,letterSpacing:1}}>
                        <div>{label}</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>{desc}</div>
                      </button>
                    ))}
                    {activeZone&&<button onClick={()=>{setActiveZone(null);setShowDeployMenu(false);}} style={{display:"block",width:"100%",padding:"5px 8px",marginTop:4,background:"transparent",border:`1px solid ${C.red}`,borderRadius:2,cursor:"pointer",color:C.red,fontFamily:"'Rajdhani',monospace",fontSize:11,fontWeight:600,letterSpacing:1}}>✕ OCULTAR ZONA</button>}
                  </div>
                )}
              </div>
              {unassigned>0&&<span className="tag pulse" style={{marginLeft:"auto",background:"rgba(249,115,22,.1)",color:C.accent,border:"1px solid #7c3100"}}>⚠ {unassigned} SIN ASIGNAR</span>}
            </div>
            {/* Etiqueta de tamaño del tablero */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              marginBottom:4,padding:"3px 6px",background:"rgba(7,15,32,0.8)",
              borderRadius:2,border:`1px solid ${C.border}`}}>
              <span style={{fontSize:11,color:C.muted,letterSpacing:1,fontFamily:"'Share Tech Mono',monospace"}}>
                {modeInfo.w}" × {modeInfo.h}"
                <span style={{color:C.border,margin:"0 6px"}}>·</span>
                <span style={{color:C.muted}}>{(modeInfo.w*2.54).toFixed(0)}cm × {(modeInfo.h*2.54).toFixed(0)}cm</span>
              </span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {zoom!==1&&<>
                  <span style={{fontSize:11,color:C.muted,fontFamily:"'Share Tech Mono',monospace"}}>
                    {Math.round(zoom*100)}%
                  </span>
                  <button onClick={resetZoom} className="rb" style={{padding:"1px 7px",fontSize:11}}>↺</button>
                </>}
              </div>
            </div>
            {/* Canvas — aspect ratio 44:30 del tablero de Combat Patrol */}
            <div style={{position:"relative",overflow:"hidden",borderRadius:2,
              border:`1px solid ${C.border}`,flex:"0 0 auto",width:"100%"}}>
              <canvas ref={canvasRef} width={700} height={520}
                onClick={handleCanvasClick}
                onMouseDown={handleMouseDown}
                onMouseMove={handleMouseMove}
                onMouseUp={handleMouseUp}
                onMouseLeave={handleMouseUp}
                onWheel={handleWheel}
                style={{display:"block",width:"100%",height:"auto",
                  aspectRatio:"700/520",maxHeight:"calc(100vh - 180px)",
                  cursor:isDraggingGroup.current?"grabbing":isDraggingMini.current?"grabbing":selMinis.size>0?"grab":selMini?"crosshair":isPanning.current?"grabbing":"crosshair"}}/>
              {assignMenu&&(
                <div style={{position:"absolute",left:assignMenu.x+10,top:assignMenu.y-10,background:C.panel,border:`1px solid ${C.accent}`,borderRadius:2,padding:7,zIndex:10,minWidth:170,boxShadow:"0 0 18px rgba(249,115,22,0.18)"}}>
                  <div style={{fontSize:12,color:C.muted,letterSpacing:1,marginBottom:7}}>ASIGNAR JUGADOR</div>
                  {players.map(p=>(
                    <button key={p.id} onClick={()=>{setMinis(prev=>prev.map(m=>m.id===assignMenu.miniId?{...m,playerId:p.id}:m));setAssignMenu(null);setSelMini(null);}}
                      style={{display:"flex",alignItems:"center",gap:7,width:"100%",padding:"5px 7px",background:"transparent",border:"none",cursor:"pointer",color:C.text,fontSize:12,fontFamily:"'Rajdhani',monospace",fontWeight:600,letterSpacing:1}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(249,115,22,0.18)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <span style={{width:7,height:7,borderRadius:"50%",background:p.color,boxShadow:`0 0 5px ${p.color}`}}/>{p.name}
                    </button>
                  ))}
                  <div style={{borderTop:`1px solid ${C.border}`,margin:"3px 0"}}/>
                  <button onClick={()=>removeMiniById(assignMenu.miniId)} style={{width:"100%",padding:"4px 7px",background:"transparent",border:"none",cursor:"pointer",color:C.red,fontSize:11,fontFamily:"'Rajdhani',monospace",letterSpacing:1,textAlign:"left"}}>✕ ELIMINAR DEL TABLERO</button>
                </div>
              )}
            </div>
            <div style={{marginTop:8,display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
              {players.map(p=>{const s=gameStats[p.id]||{};return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,letterSpacing:1}}>
                  <span style={{width:7,height:7,borderRadius:"50%",background:p.color,boxShadow:`0 0 5px ${p.color}`}}/>
                  <span style={{color:p.color,fontWeight:600}}>{p.name}</span>
                  <span style={{color:C.muted}}>{s.deployed||0} en juego{s.eliminated>0?` · ${s.eliminated} bajas`:""}{s.pending>0?` · ${s.pending} pend.`:""}</span>
                </div>
              );})}
              {minis.length===0&&<span style={{fontSize:12,color:C.muted}}>Ve a JUEGO para seleccionar patrullas y desplegar unidades</span>}
            </div>
          </div>
          <div style={{width:190,flexShrink:0}}>
            <div className="panel" style={{borderRadius:2,padding:10,marginBottom:8}}>
              <div style={{color:C.muted,fontSize:12,letterSpacing:2,marginBottom:6}}>MODO ACTIVO</div>
              <div style={{fontSize:11,fontWeight:700,color:sysInfo.color,letterSpacing:1}}>{sysInfo.short}</div>
              <div style={{fontSize:12,color:C.text}}>{modeInfo.label}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{modeInfo.w}" × {modeInfo.h}"</div>
            </div>
            {players.map(p=>{const patrol=playerPatrols[p.id];const s=gameStats[p.id]||{};const fc=patrol?(FACTION_COLORS[patrol.faction_keyword]||C.blue):C.muted;return(
              <div key={p.id} className="panel" style={{borderRadius:2,padding:10,marginBottom:6,borderLeft:`2px solid ${p.color}`}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:p.color}}/>
                  <span style={{fontSize:11,fontWeight:700,color:p.color,letterSpacing:1}}>{p.name}</span>
                </div>
                {patrol?(
                  <>
                    <div style={{fontSize:12,color:fc,marginBottom:4}}>{patrol.patrol_name}</div>
                    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                      {s.deployed>0&&<span className="tag" style={{color:C.green,background:"rgba(34,197,94,.1)",fontSize:11}}>{s.deployed} en juego</span>}
                      {s.pending>0&&<span className="tag" style={{color:C.muted,background:C.bg,fontSize:11}}>{s.pending} pend.</span>}
                      {s.eliminated>0&&<span className="tag" style={{color:C.red,background:"rgba(244,63,94,.1)",fontSize:11}}>{s.eliminated} bajas</span>}
                    </div>
                  </>
                ):<div style={{fontSize:12,color:C.muted}}>Sin patrulla.</div>}
              </div>
            );})}
          </div>
        </div>
      )}

      {/* ══ JUGADORES ══ */}
      {tab==="JUGADORES"&&(
        <div style={{padding:16,maxWidth:440}}>
          <div style={{color:C.muted,fontSize:12,letterSpacing:2,marginBottom:14}}>// REGISTRO DE JUGADORES</div>
          {players.map(p=>(
            <div key={p.id} className="panel" style={{borderRadius:2,padding:12,marginBottom:8,
              display:"flex",alignItems:"center",gap:12,borderLeft:`3px solid ${p.color}`}}>
              {/* Selector de color — click en el círculo abre el color picker */}
              <div style={{position:"relative",flexShrink:0}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:p.color,
                  boxShadow:`0 0 10px ${p.color}`,cursor:"pointer",
                  border:"2px solid rgba(255,255,255,0.15)"}}
                  onClick={()=>document.getElementById(`cp_${p.id}`).click()}/>
                <input id={`cp_${p.id}`} type="color" value={p.color}
                  onChange={e=>setPlayers(prev=>prev.map(x=>x.id===p.id?{...x,color:e.target.value}:x))}
                  style={{position:"absolute",opacity:0,width:0,height:0,top:0,left:0}}/>
              </div>
              <span style={{flex:1,fontWeight:700,letterSpacing:1,color:p.color,fontSize:15}}>{p.name}</span>
              <span className="tag" style={{color:p.color,background:`rgba(${h2rgb(p.color)},.1)`,fontSize:12}}>
                {minis.filter(m=>m.playerId===p.id).length} MINIS
              </span>
              <button onClick={()=>setPlayers(prev=>prev.filter(x=>x.id!==p.id))}
                className="rb" style={{padding:"3px 9px",fontSize:12}}>✕</button>
            </div>
          ))}
          <button onClick={()=>setPlayers(prev=>{
            const id=Math.max(0,...prev.map(p=>p.id))+1;
            return[...prev,{id,name:`JUGADOR ${["I","II","III","IV","V","VI"][id-1]||id}`,
              color:PLAYER_COLORS[(id-1)%PLAYER_COLORS.length]}];
          })} className="rb" style={{width:"100%",padding:"10px",fontSize:12,letterSpacing:2,marginTop:4}}>
            + AÑADIR JUGADOR
          </button>
        </div>
      )}

      {/* ══ JUEGO ══ */}
      {tab==="JUEGO"&&(
        <div style={{padding:14}}>
          {/* Sistema + Modo */}
          <div className="panel" style={{borderRadius:2,padding:12,marginBottom:12}}>
            <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-start"}}>
              <div>
                <div style={{color:C.muted,fontSize:12,letterSpacing:2,marginBottom:6}}>SISTEMA DE JUEGO</div>
                <div style={{display:"flex",gap:4}}>
                  {Object.entries(GAME_SYSTEMS).map(([key,sys])=>(
                    <button key={key} onClick={()=>changeSystem(key)} className={`rb ${activeSystem===key?"bon":""}`}
                      style={{padding:"5px 12px",fontSize:11,letterSpacing:1,borderColor:activeSystem===key?sys.color:C.border,color:activeSystem===key?sys.color:C.muted}}>
                      {sys.label}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{color:C.muted,fontSize:12,letterSpacing:2,marginBottom:6}}>MODO DE JUEGO</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {Object.entries(sysInfo.modes).map(([key,m])=>(
                    <button key={key} onClick={()=>changeMode(key)} className={`rb ${activeMode===key?"on":""}`} style={{padding:"5px 12px",fontSize:11,letterSpacing:1}}>{m.label}</button>
                  ))}
                </div>
              </div>
              <div style={{marginLeft:"auto",textAlign:"right"}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:2}}>TABLERO</div>
                <div style={{fontSize:14,fontWeight:700,color:sysInfo.color}}>{modeInfo.w}" × {modeInfo.h}"</div>
                <div style={{fontSize:12,color:C.muted}}>{modeInfo.maxRounds} rondas</div>
              </div>
            </div>
          </div>

          {/* Selectores de patrulla */}
          <div style={{display:"grid",gridTemplateColumns:`repeat(${players.length},1fr)`,gap:10,marginBottom:14}}>
            {players.map(p=>(
              <PatrolSelector key={p.id} playerId={p.id} playerColor={p.color} playerName={p.name}
                patrol={playerPatrols[p.id]} patrols={patrols} system={activeSystem} mode={activeMode}
                onSelectPatrol={(patrol)=>selectPatrol(p.id,patrol)}/>
            ))}
          </div>

          {/* Listas de unidades */}
          {Object.keys(playerPatrols).length>0&&(
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(players.filter(p=>playerPatrols[p.id]).length,2)},1fr)`,gap:10}}>
              {players.filter(p=>playerPatrols[p.id]).map(p=>{
                const patrol=playerPatrols[p.id];
                const status=unitStatus[p.id]||{};
                const fc=FACTION_COLORS[patrol.faction_keyword]||C.blue;
                const stats=gameStats[p.id]||{};
                return(
                  <div key={p.id}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"8px 10px",background:C.panel,borderRadius:2,borderLeft:`3px solid ${p.color}`}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:700,color:p.color,letterSpacing:1}}>{p.name}</div>
                        <div style={{fontSize:11,color:fc}}>{patrol.patrol_name}</div>
                      </div>
                      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                        <span className="tag" style={{color:C.green,background:"rgba(34,197,94,.1)",fontSize:11}}>{stats.deployed||0} en juego</span>
                        <span className="tag" style={{color:C.muted,background:C.bg,fontSize:11}}>{stats.pending||0} pend.</span>
                        {(stats.eliminated||0)>0&&<span className="tag" style={{color:C.red,background:"rgba(244,63,94,.1)",fontSize:11}}>{stats.eliminated} bajas</span>}
                      </div>
                    </div>
                    {patrol.faction_ability&&(
                      <div style={{padding:"5px 8px",background:C.panel,borderRadius:2,marginBottom:6,borderLeft:`2px solid ${fc}44`,fontSize:12,color:C.muted}}>
                        <span style={{color:fc,fontWeight:700,marginRight:5}}>{patrol.faction_ability.name}</span>
                        {patrol.faction_ability.description}
                      </div>
                    )}
                    <div>
                      {(patrol.units||[]).map(unit=>{
                        const unitSt=status[unit.id]||{deployed:0,eliminated:0,total:unit.count||1};
                        const isSel=selUnit?.playerId===p.id&&selUnit?.unitId===unit.id;
                        // Mini más reciente de esta unidad para eliminar
                        const lastMini=minis.filter(m=>m.playerId===p.id&&m.unitData?.id===unit.id).slice(-1)[0];
                        return(
                          <UnitRow key={unit.id} unit={{...unit,faction_keyword:patrol.faction_keyword}}
                            unitSt={unitSt} playerColor={p.color} selected={isSel}
                            onClick={()=>setSelUnit(isSel?null:{playerId:p.id,unitId:unit.id})}
                            onDeploy={()=>deployUnit(p.id,unit,patrol)}
                            onDeployAll={()=>deployAllUnit(p.id,unit,patrol)}
                            onEliminate={()=>lastMini&&eliminateUnit(p.id,unit.id,lastMini.id)}/>
                        );
                      })}
                    </div>
                    {patrol.stratagems?.length>0&&(
                      <div style={{marginTop:8}}>
                        <div style={{fontSize:12,color:C.muted,letterSpacing:2,marginBottom:5}}>ESTRATAGEMAS</div>
                        {patrol.stratagems.map(s=>(
                          <div key={s.name} style={{padding:"5px 8px",background:C.panel,borderRadius:2,marginBottom:3,borderLeft:"2px solid #38bdf844"}}>
                            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                              <span style={{fontSize:12,fontWeight:700,color:C.blue}}>{s.name}</span>
                              <span className="tag" style={{color:C.blue,background:"rgba(56,189,248,.1)",fontSize:8}}>{s.cost_cp}CP</span>
                            </div>
                            <div style={{fontSize:11,color:C.muted,lineHeight:1.3}}>{s.effect}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
          {Object.keys(playerPatrols).length===0&&(
            <div style={{padding:"40px 20px",textAlign:"center",color:C.muted,fontSize:11,letterSpacing:1}}>
              Selecciona un modo de juego y elige la patrulla de cada jugador para comenzar
            </div>
          )}
        </div>
      )}

      {/* ══ CONFIG ══ */}
      {tab==="CONFIG"&&(
        <div style={{padding:14,maxWidth:560}}>
          <div style={{color:C.muted,fontSize:12,letterSpacing:2,marginBottom:14}}>// CONFIGURACIÓN</div>
          {/* Calibración de cámara */}
          <CameraCalibration/>
          {/* Panel colores de auras */}
          <div className="panel" style={{borderRadius:2,padding:14,marginBottom:10}}>
            <div style={{color:C.accent,fontSize:12,letterSpacing:2,marginBottom:10}}>COLORES DE AURAS</div>
            {[
              {key:"move",    label:"Movimiento (M)"},
              {key:"charge",  label:"Carga (C)"},
              {key:"shoot",   label:"Disparo (AD)"},
              {key:"abilities",label:"Habilidades (HAB)"},
              {key:"engage",  label:"Engagement Range (ER)"},
            ].map(({key,label})=>(
              <div key={key} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{position:"relative",flexShrink:0}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:auraColors[key],
                    boxShadow:`0 0 8px ${auraColors[key]}`,cursor:"pointer",
                    border:"2px solid rgba(255,255,255,0.15)"}}
                    onClick={()=>document.getElementById(`aura_${key}`).click()}/>
                  <input id={`aura_${key}`} type="color" value={auraColors[key]}
                    onChange={e=>setAuraColors(prev=>({...prev,[key]:e.target.value}))}
                    style={{position:"absolute",opacity:0,width:0,height:0,top:0,left:0}}/>
                </div>
                <span style={{flex:1,fontSize:13,color:auraColors[key],fontWeight:700,letterSpacing:1}}>{label}</span>
                <span style={{fontSize:11,color:C.muted,fontFamily:"'Share Tech Mono',monospace"}}>{auraColors[key]}</span>
                <button onClick={()=>{
                  const defaults={move:"#22c55e",charge:"#a855f7",shoot:"#38bdf8",abilities:"#fbbf24",engage:"#f43f5e"};
                  setAuraColors(prev=>({...prev,[key]:defaults[key]}));
                }} className="rb" style={{padding:"2px 7px",fontSize:12}}>↺</button>
              </div>
            ))}
          </div>
          <div className="panel" style={{borderRadius:2,padding:14,marginBottom:10}}>
            <div style={{color:C.accent,fontSize:11,letterSpacing:2,marginBottom:8}}>ANTHROPIC API KEY</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:8,lineHeight:1.4}}>Necesaria para importar Combat Patrols desde PDF. Solo se guarda en memoria.</div>
            <div style={{display:"flex",gap:6}}>
              <input type={showApiKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."
                style={{flex:1,background:C.bg,border:`1px solid ${apiKey?C.green:C.border}`,borderRadius:2,padding:"6px 10px",color:C.text,fontFamily:"'Share Tech Mono',monospace",fontSize:12,outline:"none"}}/>
              <button className="rb" onClick={()=>setShowApiKey(v=>!v)} style={{padding:"6px 10px",fontSize:11}}>{showApiKey?"OCULTAR":"VER"}</button>
            </div>
            {apiKey&&<div style={{marginTop:5,fontSize:12,color:C.green}}>✓ API key configurada</div>}
          </div>
          <div className="panel" style={{borderRadius:2,padding:14,marginBottom:10}}>
            <div style={{color:C.accent,fontSize:11,letterSpacing:2,marginBottom:8}}>IMPORTAR COMBAT PATROL (PDF)</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.4}}>Sube el PDF oficial de una Combat Patrol. Claude extraerá automáticamente unidades, armas, habilidades y estratagemas.</div>
            <div className={`drop-zone ${dragOver?"drag-over":""}`} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={handleDrop} onClick={()=>fileRef.current?.click()}>
              {pdfLoading?(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}><div className="spin" style={{fontSize:22}}>⟳</div><div style={{fontSize:11,color:C.blue}}>Procesando con Claude...</div></div>):(<div><div style={{fontSize:18,marginBottom:5}}>📄</div><div style={{fontSize:11,color:C.muted}}>Arrastra un PDF o haz clic para seleccionar</div></div>)}
            </div>
            <input ref={fileRef} type="file" accept="application/pdf" onChange={handleFileInput}/>
            {pdfStatus&&(<div style={{marginTop:8,padding:"7px 10px",borderRadius:2,fontSize:11,background:pdfStatus.type==="error"?"rgba(244,63,94,.1)":pdfStatus.type==="success"?"rgba(34,197,94,.1)":"rgba(56,189,248,.1)",border:`1px solid ${pdfStatus.type==="error"?C.red:pdfStatus.type==="success"?C.green:C.blue}`,color:pdfStatus.type==="error"?C.red:pdfStatus.type==="success"?C.green:C.blue}}>{pdfStatus.msg}</div>)}
          </div>
          <div className="panel" style={{borderRadius:2,padding:14,marginBottom:10}}>
            <div style={{color:C.accent,fontSize:11,letterSpacing:2,marginBottom:8}}>PROYECCIÓN — IMÁGENES PERSONALIZADAS</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.4}}>
              Proyecta logos, emblemas o cualquier imagen sobre el tablero. Útil para logos de tienda, emblemas de facción o marcadores personalizados.
            </div>
            <OverlayManager overlays={overlays} setOverlays={setOverlays} players={players}/>
          </div>
          <div className="panel" style={{borderRadius:2,padding:14,marginBottom:10}}>
            <div style={{color:C.accent,fontSize:11,letterSpacing:2,marginBottom:8}}>MARCADORES ARUCO — CALIBRACIÓN DE CÁMARA</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.4}}>Genera marcadores ArUco temáticos por facción para las 4 esquinas del tablero. La cámara cenital los detecta automáticamente para calibrar posición y escala en tiempo real.</div>
            <ArucoGenerator/>
          </div>
          <div className="panel" style={{borderRadius:2,padding:14}}>
            <div style={{color:C.accent,fontSize:11,letterSpacing:2,marginBottom:8}}>PATRULLAS DISPONIBLES ({patrols.length})</div>
            {patrols.map(p=>{const fc=FACTION_COLORS[p.faction_keyword]||C.blue;return(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",background:C.bg,borderRadius:2,marginBottom:3,borderLeft:`2px solid ${fc}`}}>
                <div style={{width:5,height:5,borderRadius:"50%",background:fc,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.text,fontWeight:700}}>{p.patrol_name}</div>
                  <div style={{fontSize:11,color:C.muted}}>{p.faction} · {p.system} · {p.game_mode}</div>
                </div>
                <span style={{fontSize:11,color:fc}}>{p.units?.length||0} uds</span>
                {!EMBEDDED_PATROLS.find(e=>e.id===p.id)&&(<button onClick={()=>setPatrols(prev=>prev.filter(x=>x.id!==p.id))} className="rb" style={{padding:"1px 6px",fontSize:12,color:C.red,borderColor:C.red}}>✕</button>)}
              </div>
            );})}
          </div>
        </div>
      )}

      {/* Leyenda */}
      {showLegend&&(
        <div style={{position:"fixed",inset:0,background:"rgba(5,13,26,.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}} onClick={()=>setShowLegend(false)}>
          <div className="panel fade-in" style={{borderRadius:4,padding:22,width:360,borderColor:C.blue}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{color:C.blue,fontWeight:700,letterSpacing:2,fontSize:13}}>// ÍNDICE DE AURAS</span>
              <button onClick={()=>setShowLegend(false)} className="rb" style={{padding:"2px 8px",fontSize:12}}>✕</button>
            </div>
            {[
              {key:"move",    label:"M — MOVIMIENTO",   desc:'Radio de movimiento en pulgadas.'},
              {key:"charge",  label:"C — CARGA",         desc:'Alcance de carga estimado (M + 7" media de 2D6).'},
              {key:"shoot",   label:"AD — ARMA DIST.",   desc:'Alcance del arma de mayor rango.'},
              {key:"abilities",label:"HAB — HABILIDADES",desc:'Auras de habilidades (Sinapsis, Fortune, Omni-scramblers…)'},
              {key:"engage",  label:"ER — ENGAGEMENT",   desc:'Zona de combate cuerpo a cuerpo (1" desde el borde de la peana).'},
            ].map(({key,label,desc})=>{
              const color=auraColors[key]||C.green;
              return(
              <div key={key} style={{marginBottom:8,padding:10,background:C.bg,borderRadius:2,borderLeft:`3px solid ${color}`}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:color}}/>
                  <span style={{fontWeight:700,fontSize:12,color,letterSpacing:1}}>{label}</span>
                </div>
                <p style={{fontSize:12,color:C.muted,lineHeight:1.4}}>{desc}</p>
              </div>
              );
            })}
            <div style={{fontSize:12,color:C.muted,textAlign:"center",marginTop:6}}>CLIC FUERA PARA CERRAR</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
